<header><h1>TAS MVP</h1><span class="meta">ストーリー制作ワークスペース</span><span class="spacer"></span><div class="top-actions"><div class="switch-row" style="gap:8px"><span>補助パネル</span><label class="switch"><input type="checkbox" id="toggleRightSwitch"><span class="slider"></span></label></div><button class="ghost" id="btnSaveDraft">保存</button><button class="ghost" id="btnLoadCampaign">読込</button><input class="sr-only" type="file" id="campaignFileInput" accept="application/json" multiple><button id="btnBuild">出力確認</button></div></header>

let assistantMode="prompt";let assistantAiResult="";
const DRAFT_KEY="tas_campaign_draft_v1";const $=id=>document.getElementById(id);let context=null;let activeTab="world";let activeChapter="ch1";let selectedNode={type:"scene",index:0};let history=[];let draft="";let review="";let rightPanelEnabled=false;const DEFAULT_CAMPAIGN_NAME="ランタンヒル年代記";const DEFAULT_CAMPAIGN_WORLD="ミステリ / ロー・ファンタジー。静かで神秘的、少し切ない。";const DEFAULT_CAMPAIGN_TERMS="現代語彙を避ける。\n禁止語：懐中電灯、電灯、モーター、エンジン、電池、メートル\n言い換えが必要な場合は、世界観に合う平易な表現を使う。";let campaignName=DEFAULT_CAMPAIGN_NAME;let campaignImage="";let campaignWorld=DEFAULT_CAMPAIGN_WORLD;let campaignTerms=DEFAULT_CAMPAIGN_TERMS;let extraCompanions=0;let npcCount=1;let monsters=[];let items=[];let castImages={};let castNames={};let castProfiles={};let castFlags={};let castAttributes={};let sceneBackgrounds={};let sceneOverrides={};let discoveryFoldState={};let pendingCastFocus=null;let collapsedCampaign=false;let collapsedChapters={ch1:false,ch2:false};

function renderScenes(){const list=$("sceneList");const globals=[["world","世界設定"],["cast","キャスト／エージェント"],["monsters","モンスター"],["items","アイテム"],["rules","共通ルール"]];let html=`<div class="tree-root" data-toggle-campaign><span class="caret">${collapsedCampaign?"▸":"▾"}</span>${escapeHtml(campaignName)}</div><div class="tree-block ${collapsedCampaign?"collapsed":""}">${globals.map(([tab,label])=>`<button class="global-item ${activeTab===tab?"active":""}" data-global="${tab}">├─ ${label}</button>`).join("")}<div class="tree-label">チャプター</div>`;const chapterEntries=freshCampaign?chapterOrder.map((key,index)=>[key,chapterNames[key]||`チャプター${index+1}（未命名）`]):[["ch1","第1話「廃坑の灯」"],["ch2","第2話「心石の在処」"]];for(const [key,label] of chapterEntries){const nodes=key===activeChapter?chapterNodes():freshCampaign?[]:[{type:"scene",id:1,index:0,name:"シーン1",goal:"章の導入"},{type:"scene",id:2,index:1,name:"シーン2",goal:"章の展開"}];const collapsed=Boolean(collapsedChapters[key]);html+=`<button class="chapter-heading" data-chapter="${key}"><span class="caret">${collapsed?"▸":"▾"}</span>${label}</button><div class="chapter-children ${collapsed?"collapsed":""}">${nodes.map((n,i)=>`<button class="scene-item ${key===activeChapter&&n.type===selectedNode.type&&n.index===selectedNode.index?"active":""}" data-node="${i}" data-chapter-node="${key}">${n.type==="scene"?`├─ シーン${n.id}`:n.type==="opening"?"├─ オープニング":n.type==="ending"?"├─ エンディング":"└─ インターミッション"}：${escapeHtml(n.name)}</button>`).join("")}</div>`}html+=`</div>`;list.innerHTML=html;list.querySelectorAll("[data-toggle-campaign]").forEach(b=>b.onclick=()=>{collapsedCampaign=!collapsedCampaign;saveWorkspaceDraft();renderScenes();renderAll()});list.querySelectorAll("[data-global]").forEach(b=>b.onclick=()=>{activeTab=b.dataset.global;renderScenes();renderAll()});list.querySelectorAll("[data-chapter]").forEach(b=>b.onclick=()=>{const key=b.dataset.chapter;if(activeChapter!==key){activeChapter=key;selectedNode={type:"opening"};collapsedCampaign=false;collapsedChapters[key]=false;activeTab="structure"}else{collapsedChapters[key]=!collapsedChapters[key]}saveWorkspaceDraft();renderScenes();renderAll()});list.querySelectorAll("[data-node]").forEach(b=>b.onclick=()=>{if(b.dataset.chapterNode!==activeChapter){activeChapter=b.dataset.chapterNode;selectedNode={type:"opening"};collapsedCampaign=false;collapsedChapters[activeChapter]=false}else{const n=chapterNodes()[Number(b.dataset.node)];selectedNode={type:n.type,index:n.index}}activeTab="structure";renderScenes();renderAll()})}
/* entityLedgerEntries()の実体は後段(エンティティ台帳セクション)でensureEntityLedger()ベースに

function renderWorld(){const image=campaignImage?`<img src="${campaignImage}">`:"キャンペーン画像なし";const castChips=currentSceneCastChips();const ledger=entityLedgerEntries();return `<h2>世界設定</h2><p class="hint">キャンペーンの世界観を設定します。</p><div class="field"><label>キャンペーン画像</label><div class="scene-bg">${image}</div><input type="file" accept="image/*" id="campaignImageInput"></div><div class="field"><label>キャンペーン名</label><input id="campaignName" value="${escapeHtml(campaignName)}"></div><div class="field"><label>世界・ジャンル</label><textarea id="worldField">${escapeHtml(campaignWorld)}</textarea></div><div class="field"><label>テーマ</label><input id="themeField" value="${escapeHtml(campaignTheme)}"></div><div class="field"><label>用語・禁止事項</label><p class="hint">キャンペーン全体の語彙、禁止語、言い換え、文体ルールを記入します。</p><textarea id="termsField">${escapeHtml(campaignTerms)}</textarea></div><div class="card"><h3>エンティティ台帳（現在の登録名）</h3><p class="hint">登録先をクリックすると、該当する編集画面へ移動します。</p><table class="ledger-table"><thead><tr><th>分類</th><th>表示名</th><th>登録先</th></tr></thead><tbody>${ledger.length?ledger.map(x=>`<tr><td>${escapeHtml(x.category)}</td><td>${escapeHtml(x.name)}</td><td>${x.tab?`<button class="sub ledger-link" data-ledger-tab="${x.tab}" data-ledger-focus="${x.focus||""}" data-ledger-chapter="${x.chapter||""}" data-ledger-index="${x.index??""}">${escapeHtml(x.source)}</button>`:escapeHtml(x.source)}</td></tr>`).join(""):`<tr><td colspan="3">まだ登録されていません</td></tr>`}</tbody></table></div><div class="card"><h3>登場人物</h3><p class="hint">このキャンペーンで登場するキャスト</p><div class="chips">${castChips.length?castChips.map(c=>`<button class="chip" data-open-cast="${c.id}">${escapeHtml(c.name)}</button>`).join(""):`<span class="chip">使用キャストなし</span>`}</div></div>`}
function renderStructure(){const s=scene();const key=sceneKey();const label=s.type==="opening"?"オープニング":s.type==="intermission"?"インターミッション":s.type==="ending"?"エンディング":`シーン${s.id}`;const bg=sceneBackgrounds[key]?`<img src="${sceneBackgrounds[key]}">`:"背景画像なし";const selectedNpcs=new Set(s.npcs||[]);const npcChecks=npcList().map(n=>`<label class="check-row"><input type="checkbox" class="scene-npc" value="${n.id}" ${selectedNpcs.has(n.id)?"checked":""}>${escapeHtml(n.name)}</label>`).join("")||"<p class=\"hint\">キャスト／エージェントでNPCを登録すると、ここに表示されます。</p>";const transitions=(Array.isArray(s.transitions)&&s.transitions.length?s.transitions:[{conditionType:"flag",conditionValue:"",target:""}]).map(normalizeTransition);return `<h2>${label}の設定</h2><p class="hint">このシーンの背景、開始時の説明、登場NPC、次のシーンへの進み方を設定します。</p><div class="field"><label>背景画像</label><div class="scene-bg">${bg}</div><input type="file" accept="image/*" id="sceneBgInput"></div><div class="field"><label>名称</label><input id="sceneName" value="${escapeHtml(s.name)}"></div><div class="field"><label>開始時の説明</label><textarea id="sceneBrief">${escapeHtml(s.brief)}</textarea></div><div class="field"><label>登場NPC</label><p class="hint">キャスト／エージェントで登録したNPCを表示します。登場する場合だけチェックします。GMとメンバーは全シーン共通なので、ここでは指定しません。</p><div class="check-list">${npcChecks}</div></div><div class="field"><label>分岐／接続先</label><p class="hint">条件を選び、条件値と接続先を指定します。条件は6種類に統一します。</p><div class="transition-list">${transitions.map((t,i)=>`<div class="transition-row"><div class="field"><label>条件種別</label><select class="transition-type" data-transition-index="${i}">${TRANSITION_TYPES.map(([id,name])=>`<option value="${id}" ${t.conditionType===id?"selected":""}>${name}</option>`).join("")}</select></div><div class="field"><label>条件値</label><input class="transition-value" data-transition-index="${i}" value="${escapeHtml(t.conditionValue)}" placeholder="例：rail_info / 古い鍵 / rust_eater=defeated"></div><div class="field"><label>移動先</label><select class="transition-target" data-transition-index="${i}"><option value="">選択してください</option>${sceneTargets().map(n=>`<option value="${escapeHtml(sceneRef(n))}" ${t.target===sceneRef(n)?"selected":""}>${escapeHtml(sceneRefLabel(n))}</option>`).join("")}</select></div><button class="sub" data-remove-transition="${i}">削除</button></div>`).join("")}</div><div class="bottom"><button class="sub" id="btnAddTransition">＋ 分岐を追加</button></div></div>`}
function renderState(){const s=scene();const key=sceneKey();const foldState=discoveryFoldState[key]||{};const discoveries=(s.discoveries||[]).map(normalizeDiscovery);const summary={major:discoveries.filter(x=>x.importance==="major").length,support:discoveries.filter(x=>x.importance==="support").length,flavor:discoveries.filter(x=>x.importance==="flavor").length};return `<h2>シーン要素</h2><p class="hint">シーン内で開示しうる要素台帳です。プレイヤーが見聞きする情報と、ゲーム本体が保持する確定事実を分けて管理します。</p><div class="card"><div class="state-toolbar"><div class="meta-row"><h3>シーン要素</h3><div class="discovery-summary"><span class="chip meta-chip">${discoveries.length}件</span><span class="chip summary-chip">主線 ${summary.major}</span><span class="chip summary-chip">補助 ${summary.support}</span><span class="chip summary-chip">演出 ${summary.flavor}</span></div></div><div class="toolbar-actions"><button class="sub" id="btnAddDiscovery">＋ 要素を追加</button><button class="sub" id="btnSeedDiscoveries">テンプレートを追加</button></div></div><p class="hint">名詞、画像内要素、音や匂い、伏線までここに登録します。発見された要素は、<b>要素名をそのまま</b>シーン遷移の条件や発話ルールの発火条件に書けます。</p>${discoveries.length?discoveries.map((x,i)=>{const collapsed=Boolean(foldState[x.id]);const ordinal=discoveryOrdinalLabel(x.id,i);return `<div class="state-discovery ${collapsed?"collapsed":""}" data-discovery-index="${i}"><div class="card-head"><h3>${escapeHtml(`${ordinal} ${x.label||`発見項目${i+1}`}`)}</h3><div><button class="sub collapse-btn" data-toggle-discovery="${i}">${collapsed?"開く":"閉じる"}</button><button class="sub" data-duplicate-discovery="${i}">複製</button><button class="sub delete-btn" data-remove-discovery="${i}">削除</button></div></div><div class="discovery-summary"><span class="chip summary-chip">${escapeHtml(categoryLabel(x.category))}</span><span class="chip summary-chip">${escapeHtml(importanceLabel(x.importance))}</span><span class="chip summary-chip">${escapeHtml(x.appearances.length?x.appearances.join(" / "):"登場箇所未設定")}</span></div><div class="state-discovery-body"><div class="state-grid"><div class="field"><label>要素名</label><input class="discovery-label" data-discovery-index="${i}" value="${escapeHtml(x.label)}" placeholder="封鎖の木柵"></div><div class="field"><label>種別</label><select class="discovery-category" data-discovery-index="${i}">${DISCOVERY_CATEGORIES.map(([id,label])=>`<option value="${id}" ${x.category===id?"selected":""}>${label}</option>`).join("")}</select></div><div class="field"><label>重要度</label><select class="discovery-importance" data-discovery-index="${i}">${DISCOVERY_IMPORTANCE.map(([id,label])=>`<option value="${id}" ${x.importance===id?"selected":""}>${label}</option>`).join("")}</select></div><div class="field"><label>登場箇所</label><input class="discovery-appearances" data-discovery-index="${i}" value="${escapeHtml(joinList(x.appearances))}" placeholder="開始説明, 画像, 会話"></div><div class="field span-2"><label>表面描写</label><textarea class="discovery-surface" data-discovery-index="${i}" placeholder="プレイヤーが見聞きする情報">${escapeHtml(x.surface)}</textarea></div><div class="field span-2"><label>開示方法</label><textarea class="discovery-trigger" data-discovery-index="${i}" placeholder="木柵を調べる / 画像を拡大して見る">${escapeHtml(x.trigger)}</textarea></div><div class="field"><label>難易度（調べたときのd20判定）</label><select class="discovery-dc" data-discovery-index="${i}">${DC_LEVELS.map(([v,l])=>`<option value="${v}" ${x.dc===v?"selected":""}>${l}</option>`).join("")}</select></div></div><div class="section-divider"><h4>ゲーム連動（通常は既定のままでよい）</h4><p>条件には要素名がそのまま使えます。ここは内部キーや追加フラグが必要な場合だけ設定します。</p></div><div class="state-grid"><div class="field"><label>項目キー（英数字・_）</label><input class="discovery-key" data-discovery-index="${i}" value="${escapeHtml(x.id)}" placeholder="ch1_s2_barrier"></div><div class="field"><label>追加フラグ（カンマ区切り。任意）</label><input class="discovery-flags" data-discovery-index="${i}" value="${escapeHtml(joinList(x.tags))}" placeholder="封鎖の木柵調査済"></div><div class="field span-2"><label>別名（カンマ区切り。プレイヤー入力の照合語。1文字も可）</label><input class="discovery-aliases" data-discovery-index="${i}" value="${escapeHtml(joinList(x.aliases))}" placeholder="柵, 木柵, バリケード"></div><div class="field span-2"><label>確定事実</label><textarea class="discovery-fact" data-discovery-index="${i}" placeholder="第三坑道への通路は内側から封鎖されている">${escapeHtml(x.fact)}</textarea></div></div></div></div>`}).join(""):`<div class="empty-card"><p class="hint">まだシーン要素がありません。まずはテンプレートを追加し、必要な要素だけ残す形が速いです。</p></div>`}</div>`}
function renderExpression(){const key=sceneKey();const override=sceneOverrides[key]||{};const gmSceneNotes=override.gmSceneNotes??"このシーンでGMが見落としやすい条件、伏せるべき情報、演出上の注意点を記録する。";const rules=(override.dialogueRules||[]).map(normalizeDialogueRule);return `<h2>表現・会話</h2><p class="hint">ここでは、条件付きの発話と会話に紐づくイベント発火、GM向けの補足を管理します。</p><div class="field"><label>GM補足メモ</label><textarea id="gmSceneNotes" placeholder="例：木柵の修繕痕は s2a 調査後まで断定しない。水滴音は緊張感を出すため繰り返し使う。">${escapeHtml(gmSceneNotes)}</textarea></div><div class="card"><div class="state-toolbar"><div class="meta-row"><h3>条件付き発話ルール</h3><div class="discovery-summary"><span class="chip meta-chip">${rules.length}件</span></div></div><div class="toolbar-actions"><button class="sub" id="btnAddDialogueRule">＋ 発話ルールを追加</button></div></div><p class="hint">要素が発見されたら誰が何を言い、必要なら何を発火するかを定義します。条件にはシーン要素の要素名をそのまま書けます。</p><datalist id="discoveryNameList">${(scene().discoveries||[]).map((v,j)=>normalizeDiscovery(v,j)).map(x=>`<option value="${escapeHtml(x.label)}">`).join("")}</datalist>${rules.length?rules.map((rule,i)=>{const meta=dialogueEventMeta(rule.eventType);const options=eventTargetOptions(rule.eventType);const selectedLabel=options.find(option=>option.value===rule.targetId)?.label||rule.targetLabel||"";return `<div class="dialogue-rule" data-dialogue-index="${i}"><div class="card-head"><h3>発話ルール ${i+1}</h3><div><button class="sub" data-duplicate-dialogue="${i}">複製</button><button class="sub delete-btn" data-remove-dialogue="${i}">削除</button></div></div><div class="rule-tags"><span class="chip summary-chip">${escapeHtml(speakerLabel(rule.speaker))}</span><span class="chip summary-chip">${escapeHtml(rule.condition||"常時")}</span><span class="chip summary-chip">${escapeHtml(eventLabel(rule.eventType))}</span></div><div class="dialogue-grid"><div class="field"><label>話者</label><select class="dialogue-speaker" data-dialogue-index="${i}">${DIALOGUE_SPEAKERS.map(([id,label])=>`<option value="${id}" ${rule.speaker===id?"selected":""}>${label}</option>`).join("")}</select></div><div class="field"><label>優先度</label><select class="dialogue-priority" data-dialogue-index="${i}">${DIALOGUE_PRIORITIES.map(([id,label])=>`<option value="${id}" ${rule.priority===id?"selected":""}>${label}</option>`).join("")}</select></div><div class="field span-2"><label>発火条件（要素名をそのまま。AND / OR 可。常時なら空欄）</label><input class="dialogue-condition" data-dialogue-index="${i}" list="discoveryNameList" value="${escapeHtml(rule.condition)}" placeholder="例：封鎖の木柵"></div><div class="field span-2"><label>発言内容</label><textarea class="dialogue-line" data-dialogue-index="${i}" placeholder="調査結果に応じて表示する発言">${escapeHtml(rule.line)}</textarea></div><div class="field"><label>発火イベント</label><select class="dialogue-event-type" data-dialogue-index="${i}">${DIALOGUE_EVENTS.map(([id,label])=>`<option value="${id}" ${rule.eventType===id?"selected":""}>${label}</option>`).join("")}</select></div>${meta.mode==="none"?`<div class="field"><label>${meta.label}</label><div class="readonly-field">対象なし</div></div>`:options.length?`<div class="field"><label>${meta.label}</label><select class="dialogue-target-id" data-dialogue-index="${i}"><option value="">選択してください</option>${options.map(option=>`<option value="${escapeHtml(option.value)}" ${rule.targetId===option.value?"selected":""}>${escapeHtml(option.label)}</option>`).join("")}</select></div>`:`<div class="field"><label>${meta.label}</label><input class="dialogue-target-id" data-dialogue-index="${i}" value="${escapeHtml(rule.targetId)}" placeholder="${escapeHtml(meta.placeholder)}"></div>`}<div class="field span-2"><label>対象表示名 / 補足</label><input class="dialogue-target-label" data-dialogue-index="${i}" value="${escapeHtml(selectedLabel)}" placeholder="必要ならGM向けの表示名を補足"></div><div class="field span-2"><label>イベント補足</label><input class="dialogue-event-notes" data-dialogue-index="${i}" value="${escapeHtml(rule.eventNotes)}" placeholder="数量、演出、例外条件などを補足"></div><div class="field"><label><input type="checkbox" class="dialogue-once" data-dialogue-index="${i}" ${rule.once?"checked":""}> 一度だけ発火</label></div><div class="field"><label><input type="checkbox" class="dialogue-hidden" data-dialogue-index="${i}" ${rule.hiddenUntilTriggered?"checked":""}> 条件を満たすまで候補表示しない</label></div></div></div>`}).join(""):`<div class="empty-card"><p class="hint">まだ発話ルールがありません。必要な会話だけ追加し、状態変化はイベント種別で明示します。</p></div>`}</div>`}

<script>

const normalizeTransitionSimple=t=>({trigger:t.trigger??t.action??"",requires:t.requires??t.conditionValue??t.value??"",conditionType:conditionTypeFromValue(t.requires??t.conditionValue??t.value??"",scene()),conditionValue:t.requires??t.conditionValue??t.value??"",target:t.target||""});
const normalizeExit=t=>{const x=t&&typeof t==="object"?t:{};const match=parseList(x.match||x.matches||x.trigger||x.action||"");const requires=x.requires&&typeof x.requires==="object"?x.requires:{text:String(x.requires??x.conditionValue??x.value??"")};return {id:String(x.id||"exit_1"),match, to:x.to===null?null:String(x.to??x.target??""),requires,text:String(x.text||""),blockedText:String(x.blockedText||"")}};
const exitRequiresText=x=>{const r=x.requires&&typeof x.requires==="object"?x.requires:{};if(r.text)return String(r.text);const all=[...(r.secretsAll||[]),...(r.secretsAny||[])];return all.join(" AND ")};
const transitionToExit=(t,i)=>{const x=normalizeTransitionSimple(t);const target=x.target==="end"?"end":x.target===""?null:x.target;return normalizeExit({id:`exit_${i+1}`,match:x.trigger, to:target, requires:{text:x.requires}, text:target===null?"行き止まりです。":"",blockedText:"条件を満たしていないため、先へ進めません。"})};
const sceneExits=()=>{const s=scene();if(Array.isArray(s.exits))return s.exits.map(normalizeExit);if(Array.isArray(s.transitions)&&s.transitions.length)return s.transitions.map(transitionToExit);return s.type==="scene"&&s.id===1?[normalizeExit({id:"forward",match:["奥へ進む","坑道へ進む"],to:"scene:2"})]:[]};
const exitTargetOptions=()=>`${sceneTargets().map(n=>`<option value="${escapeHtml(sceneRef(n))}">${escapeHtml(sceneRefLabel(n))}</option>`).join("")}<option value="end">章を完了する</option><option value="__dead_end__">行き止まり（遷移なし）</option>`;
renderStructure=()=>{const s=scene();const key=sceneKey();const label=s.type==="opening"?"オープニング":s.type==="intermission"?"インターミッション":s.type==="ending"?"エンディング":`シーン${s.id}`;const bg=sceneBackgrounds[key]?`<img src="${sceneBackgrounds[key]}">`:"背景画像なし";const selectedNpcs=new Set(s.npcs||[]);const npcChecks=npcList().map(n=>`<label class="check-row"><input type="checkbox" class="scene-npc" value="${n.id}" ${selectedNpcs.has(n.id)?"checked":""}>${escapeHtml(n.name)}</label>`).join("")||"<p class='hint'>キャスト／エージェントでNPCを登録すると、ここに表示されます。</p>";const exits=sceneExits();return `<h2>${label}の設定</h2><p class="hint">このシーンの背景、開始時の説明、登場NPC、次のシーンへの進み方を設定します。</p><div class="field"><label>背景画像</label><div class="scene-bg">${bg}</div><input type="file" accept="image/*" id="sceneBgInput"></div><div class="field"><label>名称</label><input id="sceneName" value="${escapeHtml(s.name)}"></div><div class="field"><label>開始時の説明</label><textarea id="sceneBrief">${escapeHtml(s.brief)}</textarea></div><div class="field"><label>登場NPC</label><div class="check-list">${npcChecks}</div></div><div class="field"><label>このシーンの敵（モンスタータブで登録）</label><select id="sceneEnemy"><option value="">なし</option>${monsters.filter(m=>m.name).map(m=>`<option value="${escapeHtml(m.name)}" ${s.enemyName===m.name?"selected":""}>${escapeHtml(m.name)}（HP ${Number(m.hp)||10}）</option>`).join("")}</select></div><div class="field"><label>シーンの出口・分岐</label><p class="exit-help">プレイヤーの移動意図に含まれる照合語で出口を選びます。複数一致時は上から順に優先します。条件は発見項目キー・項目名をAND/ORで指定できます。</p><datalist id="discoveryNameList">${(s.discoveries||[]).map((v,j)=>normalizeDiscoveryFor(s,v,j)).map(x=>`<option value="${escapeHtml(x.label)}">`).join("")}</datalist><div class="transition-list">${exits.map((x,i)=>{const to=x.to===null?"__dead_end__":x.to;return `<div class="exit-row"><div class="field"><label>出口ID</label><input class="exit-id" data-exit-index="${i}" value="${escapeHtml(x.id)}" placeholder="right"></div><div class="field"><label>照合語（カンマ区切り）</label><input class="exit-match" data-exit-index="${i}" value="${escapeHtml(x.match.join(", "))}" placeholder="右, 柵, 奥"></div><div class="field"><label>移動先</label><select class="exit-target" data-exit-index="${i}"><option value="">選択してください</option>${exitTargetOptions().replace(`value="${escapeHtml(to)}"`,`value="${escapeHtml(to)}" selected`)}</select></div><div class="field"><label>必要条件（キー/項目名 AND/OR）</label><input class="exit-requires" data-exit-index="${i}" list="discoveryNameList" value="${escapeHtml(exitRequiresText(x))}" placeholder="s2a OR s2b"></div><button class="sub" data-remove-exit="${i}">削除</button><div class="field"><label>条件未達時の説明</label><textarea class="exit-blocked" data-exit-index="${i}" placeholder="封鎖されていて進めない。">${escapeHtml(x.blockedText)}</textarea></div><div class="field"><label>行き止まり／到達時の説明</label><textarea class="exit-text" data-exit-index="${i}" placeholder="左の坑道は行き止まりだ。">${escapeHtml(x.text)}</textarea></div></div>`}).join("")}</div><div class="bottom"><button class="sub" id="btnAddExit">＋ 出口を追加</button></div></div>`};
bindStructure=()=>{const input=$("sceneBgInput");const key=sceneKey();const update=(field,value)=>{sceneOverrides[key]={...(sceneOverrides[key]||{}),[field]:value};saveWorkspaceDraft(true);renderScenes();renderRightPanel();renderValidation()};const collectExits=()=>Array.from(document.querySelectorAll(".exit-row")).map((row,i)=>normalizeExit({id:row.querySelector(`.exit-id[data-exit-index="${i}"]`)?.value.trim()||`exit_${i+1}`,match:row.querySelector(`.exit-match[data-exit-index="${i}"]`)?.value||"",to:(()=>{const v=row.querySelector(`.exit-target[data-exit-index="${i}"]`)?.value||"";return v==="__dead_end__"?null:v})(),requires:{text:row.querySelector(`.exit-requires[data-exit-index="${i}"]`)?.value.trim()||""},blockedText:row.querySelector(`.exit-blocked[data-exit-index="${i}"]`)?.value||"",text:row.querySelector(`.exit-text[data-exit-index="${i}"]`)?.value||""}));const updateExits=()=>update("exits",collectExits());const name=$("sceneName"),brief=$("sceneBrief");if(name)name.oninput=e=>update("name",e.target.value);if(brief)brief.oninput=e=>update("brief",e.target.value);document.querySelectorAll(".scene-npc").forEach(box=>box.onchange=()=>{update("npcs",Array.from(document.querySelectorAll(".scene-npc:checked")).map(x=>x.value));setStatus("登場NPCを更新しました")});const enemySel=$("sceneEnemy");if(enemySel)enemySel.onchange=e=>{update("enemyName",e.target.value);setStatus(e.target.value?`敵を設定しました: ${e.target.value}`:"敵を外しました")};document.querySelectorAll(".exit-id,.exit-match,.exit-target,.exit-requires,.exit-blocked,.exit-text").forEach(el=>{el.oninput=updateExits;el.onchange=updateExits});document.querySelectorAll("[data-remove-exit]").forEach(btn=>btn.onclick=()=>{const idx=Number(btn.dataset.removeExit);update("exits",sceneExits().filter((_,i)=>i!==idx));renderTab()});const addBtn=$("btnAddExit");if(addBtn)addBtn.onclick=()=>{update("exits",[...sceneExits(),normalizeExit({id:`exit_${sceneExits().length+1}`,match:[],to:"",requires:{text:""}})]);renderTab()};if(input)i <script>
/* テキストプレイ最小ランタイム: 入力を要素・発話・イベント・遷移へ接続する。 */
let playtestRuntime={discovered:{},flags:{},items:{},npcs:{},unlocked:{},battles:{},fired:{},logs:{},notes:{}};
const playtestKey=()=>`${activeChapter}:${sceneKey()}`;
/* mock2と同じ照合規則: entity名は区切り記号で分割し、2文字以上の語を自動採用。
   aliasesは元の値も有効なので、「光」「石」のような1文字語も登録できます。 */
const playtestTextMatch=(text,...values)=>values.some(value=>{const raw=String(value||"").trim();if(!raw)return false;const terms=[raw,...raw.split(/[・()（）]/).map(x=>x.trim()).filter(x=>x.length>=2)];return terms.some(term=>text.includes(term))});
const playtestDiscoveryEntries=n=>(n.discoveries||[]).map((value,index)=>normalizeDiscoveryFor(n,value,index));
const playtestConditionMatches=(condition,state)=>{const raw=String(condition||"").trim();if(!raw)return true;return raw.split(/\s+OR\s+/i).some(orPart=>orPart.split(/\s+AND\s+/i).every(part=>{const rawToken=part.trim();const token=rawToken.replace(/^(flag|discovery|item|npc|scene|battle):/i,"");const eq=token.match(/^([^=]+)=(.+)$/);if(eq)return String(state.flags[eq[1].trim()]??"")===eq[2].trim();return Boolean(state.flags[token]||state.discovered[token]||state.items[token]||state.npcs[token]||state.unlocked[token]||state.battles[token])}))};

renderPlaytest=function(){const html=baseRenderPlaytestForEntityChips();const chips=playtestEntityActions();const block=`<div class="card entity-action-card"><h3>行動対象</h3><p class="hint">対象を選ぶと、プレイヤーの行動文が入力欄に入ります。</p><div class="chips">${chips.length?chips.map(x=>`<button class="chip play-entity-chip" data-play-object="${escapeHtml(x.action)}"><span class="chip-kind">${escapeHtml(x.kind)}</span> ${escapeHtml(x.label)}</button>`).join(""):`<span class="chip">このシーンの行動対象は未登録です</span>`}</div></div>`;return html.replace('<div class="play-input">',block+'<div class="play-input">')}
var baseBindPlaytestForEntityChips=bindPlaytest;
bindPlaytest=function(){baseBindPlaytestForEntityChips();document.querySelectorAll("[data-play-object]").forEach(button=>button.onclick=()=>{const input=$("playInput");if(!input)return;input.value=button.dataset.playObject||"";input.focus()})}
</script>
<script>
/* エンティティ台帳v0.1: 世界設定の参照表から、TASで編集できる共通台帳へ拡張する。 */
var entityLedger=[];
const ENTITY_KINDS=[["character","キャラクター"],["npc","NPC"],["place","場所"],["enemy","敵"],["item","アイテム"],["organization","組織"],["lore","伝承"],["custom","その他"]];
const ENTITY_IMPORTANCE=[["main","主線"],["support","補助"],["background","背景"],["flavor","雰囲気"]];
const ENTITY_AFFORDANCES=[["inspect","調べる"],["talk","話しかける"],["take","入手する"],["use","使う"],["fight","戦う"]];
function entityLedgerId(name,index=0){return stableId(name,`entity_${index+1}`)}
function ensureEntityLedger(){
  if(!entityLedger.length){
    try{const base=JSON.parse(context?.dataFiles?.["campaign.json"]||"{}");entityLedger=(base.entities||[]).map((x,i)=>({id:entityLedgerId(x.id||x.ja||x.name,i),name:x.ja||x.name||"",aliases:Array.isArray(x.aliases)?x.aliases:[],kind:x.kind||"custom",importance:x.importance||"background",surface:x.surface||"",truth:x.truth||x.visual||"",affordances:Array.isArray(x.affordances)?x.affordances:["inspect"],image:x.image||""})).filter(x=>x.name)}catch(e){entityLedger=[]}
  }
  /* 専門画面を入力元、台帳を参照・補足情報として同期する。
     IDまたは旧表示名で既存行を特定し、名前変更時も古い行を残さない。
     surface/truth/aliases等の台帳固有情報は上書きしない。削除は誤消去を避けて保留する。 */
  const sync=(entry,legacyNames=[])=>{
    if(!entry.name)return;
    const names=[entry.name,...legacyNames].filter(Boolean);
    const index=entityLedger.findIndex(x=>x.id===entry.id||names.includes(x.name));
    if(index<0){entityLedger.push({...entry,id:entry.id||entityLedgerId(entry.name,entityLedger.length)});return}
    entityLedger[index]={...entityLedger[index],...entry,id:entry.id||entityLedger[index].id,name:entry.name};
  };
  npcList().forEach(x=>sync({id:x.id,name:castName(x.id,x.name),kind:"npc",importance:"support",affordances:["talk","inspect"]},[x.name]));
  sync({id:"member_1",name:castName("member_1","ガレス"),kind:"character",importance:"support",affordances:["talk","inspect"]},["ガレス"]);
  for(let i=0;i<extraCompanions;i++){const id=`member_${i+2}`;sync({id,name:castName(id,`メンバー${i+2}`),kind:"character",importance:"support",affordances:["talk","inspect"]},[`メンバー${i+2}`])}
  monsters.forEach(x=>sync({id:x.id,name:x.name,kind:"enemy",importance:"support",affordances:["inspect","fight"],image:x.image||""}));
  items.forEach(x=>sync({id:x.id,name:x.name,kind:"item",importance:"support",affordances:["inspect","take","use"],image:x.image||""}));
  /* 専門画面が正本である種別だけ、削除も台帳へ反映する。
     場所・伝承・その他は台帳専用データのため残す。 */
  const liveIds=new Set([
    "member_1",
    ...Array.from({length:extraCompanions},(_,i)=>`member_${i+2}`),
    ...npcList().map(x=>x.id),
    ...monsters.filter(x=>x.name).map(x=>x.id),
    ...items.filter(x=>x.name).map(x=>x.id)
  ]);
  entityLedger=entityLedger.filter(x=>!["character","npc","enemy","item"].includes(x.kind)||liveIds.has(x.id));
  return entityLedger;
}
function entityLedgerById(id){return ensureEntityLedger().find(x=>x.id===id)}
function entityKindLabel(id){return ENTITY_KINDS.find(x=>x[0]===id)?.[1]||id}
function entityImportanceLabel(id){return ENTITY_IMPORTANCE.find(x=>x[0]===id)?.[1]||id}
function entityAffordanceLabels(values){return (values||[]).map(id=>ENTITY_AFFORDANCES.find(x=>x[0]===id)?.[1]||id).join("、")}
var baseWorkspaceDraftForEntityLedger=workspaceDraft;
workspaceDraft=function(){return {...baseWorkspaceDraftForEntityLedger(),entityLedger:ensureEntityLedger()}}
var baseApplyWorkspaceDraftForEntityLedger=applyWorkspaceDraft;
applyWorkspaceDraft=function(data){baseApplyWorkspaceDraftForEntityLedger(data);if(Array.isArray(data.entityLedger))entityLedger=data.entityLedger.map((x,i)=>({...x,id:x.id||entityLedgerId(x.name,i),aliases:Array.isArray(x.aliases)?x.aliases:parseList(x.aliases),affordances:Array.isArray(x.affordances)?x.affordances:["inspect"]}));}
try{const rawEntityDraft=localStorage.getItem(DRAFT_KEY);if(rawEntityDraft){const parsed=JSON.parse(rawEntityDraft);if(Array.isArray((parsed.data||parsed).entityLedger))entityLedger=(parsed.data||parsed).entityLedger}}catch(e){}
function renderEntities(){const entries=ensureEntityLedger();return `<h2>エンティティ台帳</h2><p class="hint">キャンペーン全体で使う名前と、プレイヤーが取れる行動対象を定義します。登録しただけではシーンに登場しません。</p><div class="card"><p class="hint">正式名はゲーム内の表示・所持品・判定で使う名前です。別名はプレイヤー入力との照合に使います。</p>${entries.map((x,i)=>`<div class="entity-editor" data-entity-index="${i}"><div class="card-head"><h3>${escapeHtml(x.name||`エンティティ${i+1}`)}</h3><button class="sub delete-btn" data-remove-entity="${i}">削除</button></div><div class="entity-grid"><div class="field"><label>正式名</label><input class="entity-name" data-entity-index="${i}" value="${escapeHtml(x.name)}" placeholder="心石の欠片"></div><div class="field"><label>種別</label><select class="entity-kind" data-entity-index="${i}">${ENTITY_KINDS.map(([id,label])=>`<option value="${id}" ${x.kind===id?"selected":""}>${label}</option>`).join("")}</select></div><div class="field"><label>重要度</label><select class="entity-importance" data-entity-index="${i}">${ENTITY_IMPORTANCE.map(([id,label])=>`<option value="${id}" ${x.importance===id?"selected":""}>${label}</option>`).join("")}</select></div><div class="field"><label>別名（カンマ区切り）</label><input class="entity-aliases" data-entity-index="${i}" value="${escapeHtml((x.aliases||[]).join(", "))}" placeholder="心石, 青い石"></div><div class="field span-2"><label>表層説明</label><textarea class="entity-surface" data-entity-index="${i}" placeholder="プレイヤーが最初に見聞きできる情報">${escapeHtml(x.surface||"")}</textarea></div><div class="field span-2"><label>確定情報（未開示の秘密はシーン要素側で管理）</label><textarea class="entity-truth" data-entity-index="${i}" placeholder="ゲーム側が開示後に扱う確定情報">${escapeHtml(x.truth||"")}</textarea></div><div class="field span-2"><label>プレイヤーが取れる行動</label><div class="entity-affordances">${ENTITY_AFFORDANCES.map(([id,label])=>`<label class="check-row"><input type="checkbox" class="entity-affordance" data-entity-index="${i}" value="${id}" ${(x.affordances||[]).includes(id)?"checked":""}>${label}</label>`).join("")}</div></div><div class="field span-2"><label>画像ファイル名（任意）</label><input class="entity-image" data-entity-index="${i}" value="${escapeHtml(x.image||"")}" placeholder="heartstone_fragment.png"></div></div></div>`).join("")||`<div class="empty-card">まだエンティティがありません。</div>`}</div><div class="bottom"><button class="sub" id="btnAddEntity">＋ エンティティを追加</button></div>`}
function bindEntities(){const sync=()=>{entityLedger=Array.from(document.querySelectorAll(".entity-editor")).map((card,i)=>{const get=s=>card.querySelector(s)?.value.trim()||"";return {...entityLedger[i],id:entityLedger[i]?.id||entityLedgerId(get(".entity-name"),i),name:get(".entity-name"),kind:get(".entity-kind")||"custom",importance:get(".entity-importance")||"background",aliases:parseList(get(".entity-aliases")),surface:get(".entity-surface"),truth:get(".entity-truth"),affordances:Array.from(card.querySelectorAll(".entity-affordance:checked")).map(x=>x.value),image:get(".entity-image")}});saveWorkspaceDraft(true)};document.querySelectorAll(".entity-name,.entity-kind,.entity-importance,.entity-aliases,.entity-surface,.entity-truth,.entity-affordance,.entity-image").forEach(el=>{el.oninput=sync;el.onchange=sync});document.querySelectorAll("[data-remove-entity]").forEach(btn=>btn.onclick=()=>{const i=Number(btn.dataset.removeEntity);entityLedger=entityLedger.filter((_,j)=>j!==i);saveWorkspaceDraft(true);renderTab()});const add=$("btnAddEntity");if(add)add.onclick=()=>{entityLedger=[...ensureEntityLedger(),{id:entityLedgerId("新しいエンティティ",entityLedger.length),name:"新しいエンティティ",aliases:[],kind:"custom",importance:"background",surface:"",truth:"",affordances:["inspect"],image:""}];saveWorkspaceDraft(true);renderTab()}}
var baseRenderScenesForEntityLedger=renderScenes;
renderScenes=function(){baseRenderScenesForEntityLedger();const list=$("sceneList");if(!list||list.querySelector('[data-global="entities"]'))return;const world=list.querySelector('[data-global="world"]');if(!world)return;world.insertAdjacentHTML("afterend",`<button class="global-item ${activeTab==="entities"?"active":""}" data-global="entities">├─ エンティティ台帳</button>`);list.querySelector('[data-global="entities"]').onclick=()=>{activeTab="entities";renderScenes();renderAll()}}
var baseRenderTabsForEntityLedger=renderTabs;
renderTabs=function(){baseRenderTabsForEntityLedger();if(activeTab==="entities")$("layerTabs").innerHTML=""}
var baseRenderTabForEntityLedger=renderTab;
renderTab=function(){if(activeTab!=="entities"){baseRenderTabForEntityLedger();return}const c=$("tabContent");c.innerHTML=renderEntities();bindEntities()}
var baseRenderRightPanelForEntityLedger=renderRightPanel;
renderRightPanel=function(){baseRenderRightPanelForEntityLedger();if(activeTab==="entities"){const target=$("rightBody")?.querySelector(".right-section p");if(target)target.textContent="キャンペーン／エンティティ台帳"}}
entityLedgerEntries=function(){return ensureEntityLedger().map(x=>({category:entityKindLabel(x.kind),name:x.name,tab:"entities",focus:x.id,source:"エンティティ台帳"}))}
var baseMockCampaignPayloadForEntityLedger=mockCampaignPayload;
mockCampaignPayload=function(){const payload=baseMockCampaignPayloadForEntityLedger();const entities=ensureEntityLedger().map(x=>({id:x.id,ja:x.name,aliases:x.aliases,kind:x.kind,importance:x.importance,surface:x.surface,truth:x.truth,visual:x.image||"",affordances:x.affordances}));payload.campaign={...(payload.campaign||{}),entities};return payload}
</script>
<script>
/* エンティティ台帳は「参照表→詳細入力」の順にし、専門台帳への導線を明示する。 */
function entityDestination(x){if(x.kind==="character"||x.kind==="npc")return {label:"キャスト／エージェント",tab:"cast",focus:x.id};if(x.kind==="enemy")return {label:"モンスター",tab:"monsters",focus:x.id};if(x.kind==="item")return {label:"アイテム",tab:"items",focus:x.id};return {label:"台帳の詳細",tab:"entities",focus:x.id}}
var baseRenderEntitiesForIndex=renderEntities;
renderEntities=function(){const entries=ensureEntityLedger();const indexRows=entries.map((x,i)=>{const dest=entityDestination(x);return `<tr><td>${escapeHtml(entityKindLabel(x.kind))}</td><td><button class="sub entity-index-name" data-entity-destination-tab="${dest.tab}" data-entity-destination-focus="${escapeHtml(dest.focus||"")}">${escapeHtml(x.name||`エンティティ${i+1}`)}</button></td><td>${escapeHtml(entityImportanceLabel(x.importance))}</td><td>${escapeHtml((x.aliases||[]).join("、")||"—")}</td><td>${dest.tab==="entities"?"詳細入力":`<button class="sub entity-destination" data-entity-destination-tab="${dest.tab}" data-entity-destination-focus="${escapeHtml(dest.focus||"")}>${escapeHtml(dest.label)}</button>`}</td></tr>`}).join("");const table=`<div class="card entity-index-card"><div class="card-head"><h3>エンティティ一覧</h3><span class="chip meta-chip">${entries.length}件</span></div><p class="hint">ここは目次です。名前や種別を確認し、専門の登録画面へ移動できます。</p><table class="ledger-table"><thead><tr><th>種別</th><th>正式名</th><th>重要度</th><th>別名</th><th>編集先</th></tr></thead><tbody>${indexRows||'<tr><td colspan="5">まだ登録されていません</td></tr>'}</tbody></table></div>`;return baseRenderEntitiesForIndex().replace('<div class="card">',table+'<div class="card">')}
var baseBindEntitiesForIndex=bindEntities;
bindEntities=function(){baseBindEntitiesForIndex();document.querySelectorAll("[data-entity-destination-tab]").forEach(button=>button.onclick=()=>{const tab=button.dataset.entityDestinationTab;const focus=button.dataset.entityDestinationFocus||null;if(tab==="cast")pendingCastFocus=focus;activeTab=tab;renderScenes();renderAll();setStatus(`${button.textContent.trim()}の登録画面へ移動しました`)})}
</script>
<script>
/* 一覧を横長の表ではなく、狭い画面でも読めるカード型の目次へ置き換える。 */
function renderEntityEditorCard(x,i){return `<div class="entity-editor" data-entity-index="${i}"><div class="card-head"><h3>${escapeHtml(x.name||`エンティティ${i+1}`)}</h3><button class="sub delete-btn" data-remove-entity="${i}">削除</button></div><div class="entity-grid"><div class="field"><label>正式名</label><input class="entity-name" data-entity-index="${i}" value="${escapeHtml(x.name)}" placeholder="心石の欠片"></div><div class="field"><label>種別</label><select class="entity-kind" data-entity-index="${i}">${ENTITY_KINDS.map(([id,label])=>`<option value="${id}" ${x.kind===id?"selected":""}>${label}</option>`).join("")}</select></div><div class="field"><label>重要度</label><select class="entity-importance" data-entity-index="${i}">${ENTITY_IMPORTANCE.map(([id,label])=>`<option value="${id}" ${x.importance===id?"selected":""}>${label}</option>`).join("")}</select></div><div class="field"><label>別名</label><input class="entity-aliases" data-entity-index="${i}" value="${escapeHtml((x.aliases||[]).join(", "))}" placeholder="心石、青い石"></div><div class="field span-2"><label>表層説明</label><textarea class="entity-surface" data-entity-index="${i}" placeholder="プレイヤーが最初に見聞きできる情報">${escapeHtml(x.surface||"")}</textarea></div><div class="field span-2"><label>確定情報</label><textarea class="entity-truth" data-entity-index="${i}" placeholder="開示後に扱う確定情報">${escapeHtml(x.truth||"")}</textarea></div><div class="field span-2"><label>プレイヤーが取れる行動</label><div class="entity-affordances">${ENTITY_AFFORDANCES.map(([id,label])=>`<label class="check-row"><input type="checkbox" class="entity-affordance" data-entity-index="${i}" value="${id}" ${(x.affordances||[]).includes(id)?"checked":""}>${label}</label>`).join("")}</div></div><div class="field span-2"><label>画像ファイル名（任意）</label><input class="entity-image" data-entity-index="${i}" value="${escapeHtml(x.image||"")}" placeholder="heartstone_fragment.png"></div></div></div>`}
var baseRenderEntitiesForReadableIndex=renderEntities;
renderEntities=function(){const entries=ensureEntityLedger();const rows=entries.map((x,i)=>{const dest=entityDestination(x);return `<div class="entity-index-row"><div class="entity-index-main"><div class="entity-index-title"><h4>${escapeHtml(x.name||`エンティティ${i+1}`)}</h4><span class="chip summary-chip">${escapeHtml(entityKindLabel(x.kind))}</span></div><div class="entity-index-meta"><span>重要度：${escapeHtml(entityImportanceLabel(x.importance))}</span><span>別名：${escapeHtml((x.aliases||[]).join("、")||"なし")}</span><span>行動：${escapeHtml(entityAffordanceLabels(x.affordances)||"なし")}</span></div></div><div>${dest.tab==="entities"?`<button class="sub entity-destination" data-entity-destination-tab="entities" data-entity-detail-index="${i}">詳細入力</button>`:`<button class="sub entity-destination" data-entity-destination-tab="${dest.tab}" data-entity-destination-focus="${escapeHtml(dest.focus||"")}>${escapeHtml(dest.label)}</button>`}</div></div>`}).join("");return `<h2>エンティティ台帳</h2><p class="hint">まず一覧で対象を確認し、詳細が必要なものだけ下で編集します。キャスト・モンスター・アイテムは専用画面で管理します。</p><div class="card entity-index-card"><div class="card-head"><h3>エンティティ一覧</h3><span class="chip meta-chip">${entries.length}件</span></div><div class="entity-index-list">${rows||`<div class="empty-card">まだ登録されていません。</div>`}</div></div><details class="card entity-details"><summary>台帳の詳細入力（場所・伝承・その他）</summary>${entries.map(renderEntityEditorCard).join("")||`<p class="hint">詳細入力するエンティティはありません。</p>`}</details><div class="bottom"><button class="sub" id="btnAddEntity">＋ エンティティを追加</button></div>`}
var baseBindEntitiesForReadableIndex=bindEntities;
bindEntities=function(){baseBindEntitiesForReadableIndex();document.querySelectorAll("[data-entity-detail-index]").forEach(button=>button.onclick=()=>{const details=document.querySelector(".entity-details");if(details)details.open=true;const target=document.querySelector(`[data-entity-index="${button.dataset.entityDetailIndex}"]`);target?.scrollIntoView({behavior:"smooth",block:"center"})})}
</script>
<style>
.section-index-row{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;border:1px solid var(--border);border-radius:5px;background:#1b2129;color:var(--text);padding:8px;text-align:left}
.section-index-row:hover{border-color:var(--accent);background:#222b36}

<script>
/* 種別ごとの目次を各登録画面の先頭へ置き、一覧から詳細入力へ移動できるようにする。 */
function insertSectionIndex(html,indexHtml){
  const marker="</p>";
  const at=html.indexOf(marker);
  return at<0?indexHtml+html:html.slice(0,at+marker.length)+indexHtml+html.slice(at+marker.length);
}
function sectionIndex(title,rows,emptyMessage){
  return `<div class="section-index"><div class="section-index-head"><h3>${escapeHtml(title)}</h3><span class="chip meta-chip">${rows.length}件</span></div><p class="hint">一覧から対象を選ぶと、下の詳細入力へ移動します。</p><div class="section-index-list">${rows.length?rows.map(row=>`<button class="section-index-row" data-section-focus="${escapeHtml(row.focus||row.id||"")}"><span class="index-main"><span class="index-name">${escapeHtml(row.name)}</span><span class="index-meta">${escapeHtml(row.meta||"")}</span></span><span class="sub index-jump">詳細へ</span></button>`).join(""):`<div class="section-index-empty">${escapeHtml(emptyMessage)}</div>`}</div></div>`;
}
function focusSection(selector,status){
  const target=document.querySelector(selector);
  if(!target){setStatus("詳細入力欄が見つかりません");return}
  target.scrollIntoView({behavior:"smooth",block:"center"});
  setStatus(status||"詳細入力欄を表示しました");
}
function castSectionRows(){
  const rows=[{id:"gm",name:castName("gm","GM"),meta:"GM・固定"},{id:"member_1",name:castName("member_1","ガレス"),meta:"メンバー・固定"}];
  for(let i=0;i<extraCompanions;i++){const id=`member_${i+2}`;rows.push({id,name:castName(id,`メンバー${i+2}`),meta:"メンバー"})}
  npcList().forEach(x=>rows.push({id:x.id,name:castName(x.id,x.name),meta:"NPC"}));
  return rows;
}
function monsterSectionRows(){return monsters.map((x,i)=>({id:String(i),name:x.name||`モンスター${i+1}`,meta:`HP ${Number(x.hp)||10}`}))}
function itemSectionRows(){return items.map((x,i)=>({id:String(i),name:x.name||`アイテム${i+1}`,meta:x.notes?"説明あり":"未設定"}))}
function discoverySectionRows(){
  const s=scene();
  return (s.discoveries||[]).map((raw,i)=>{const x=normalizeDiscoveryFor(s,raw,i);return {id:String(i),name:x.label||`発見項目${i+1}`,meta:`${categoryLabel(x.category)}・${importanceLabel(x.importance)}`}});
}
var baseRenderWorldForSplitLedger=renderWorld;
renderWorld=function(){
  const html=baseRenderWorldForSplitLedger();
  const start=html.indexOf('<div class="card"><h3>エンティティ台帳（現在の登録名）</h3>');
  if(start<0)return html;
  const end=html.indexOf('<div class="card"><h3>登場人物</h3>',start);
  return end<0?html.slice(0,start):html.slice(0,start)+html.slice(end);
};
var baseRenderCastForSplitLedger=renderCast;
renderCast=function(){return insertSectionIndex(baseRenderCastForSplitLedger(),sectionIndex("キャスト一覧",castSectionRows(),"キャストがありません。"))};
var baseBindCastForSplitLedger=bindCast;
bindCast=function(){
  baseBindCastForSplitLedger();
  document.querySelectorAll('[data-section-focus]').forEach(button=>button.onclick=()=>focusSection(`[data-cast-card="${button.dataset.sectionFocus}"]`,`${button.querySelector(".index-name")?.textContent||"キャスト"}の詳細入力へ移動しました`));
};
var baseRenderMonstersForSplitLedger=renderMonsters;
renderMonsters=function(){return insertSectionIndex(baseRenderMonstersForSplitLedger(),sectionIndex("モンスター一覧",monsterSectionRows(),"モンスターがありません。"))};
var baseBindMonstersForSplitLedger=bindMonsters;
bindMonsters=function(){
  baseBindMonstersForSplitLedger();
  document.querySelectorAll('[data-section-focus]').forEach(button=>button.onclick=()=>{const i=Number(button.dataset.sectionFocus);focusSection(`.monster-name[data-monster-index="${i}"]`,`${monsters[i]?.name||`モンスター${i+1}`}の詳細入力へ移動しました`)});

}

  chapterOrder.forEach((key,index)=>{
    const source=freshCampaign?{title:chapterNames[key]||`チャプター${index+1}`,scenes:Array.isArray(customChapterScenes[key])?deepCopyStructure(customChapterScenes[key]):[],opening:{},ending:{},intermission:{}}:structureSourceChapter(key);

}

<script>
/* 画像フォルダの読み込みと、登録済み画像の復元。 */

  // 削除済みチャプターの編集途中データを残すと、次回保存・出力時に復活するため。
  const activeChapterKeys=Array.isArray(data.chapterOrder)&&data.chapterOrder.length
    ? [...new Set(data.chapterOrder)]
    : [data.activeChapter||'ch1'];
  const activeChapterSet=new Set(activeChapterKeys);
  const filterChapterMap=value=>Object.fromEntries(Object.entries(value||{}).filter(([key])=>activeChapterSet.has(key)));
  const filterScopedMap=value=>Object.fromEntries(Object.entries(value||{}).filter(([key])=>activeChapterKeys.some(chapterKey=>key===chapterKey||key.startsWith(`${chapterKey}:`))));
  data.customChapterScenes=filterChapterMap(data.customChapterScenes);
  data.chapterNames=filterChapterMap(data.chapterNames);
  data.collapsedChapters=filterChapterMap(data.collapsedChapters);
  if(data.chapterIds)data.chapterIds=filterChapterMap(data.chapterIds);
  if(data.structureChapters)data.structureChapters=filterChapterMap(data.structureChapters);
  if(data.flagRulesByChapter)data.flagRulesByChapter=filterChapterMap(data.flagRulesByChapter);
  data.sceneOverrides=filterScopedMap(data.sceneOverrides);
  data.sceneBackgrounds=filterScopedMap(data.sceneBackgrounds);
  data.discoveryFoldState=filterScopedMap(data.discoveryFoldState);
  if(!activeChapterSet.has(data.activeChapter))data.activeChapter=activeChapterKeys[0];
  // 初期所持品は items[].acquisition から導出できるため、ローカル保存では二重管理しない。
  // mock2向けの campaign.initialInventory / initialInventoryIds は出力時に従来どおり生成する。
  delete data.initialInventory;
  data.campaignImage=localImageValue('campaign',data.campaignImage);
  data.castImages=Object.fromEntries(Object.entries(data.castImages||{}).map(([id,value])=>[id,localImageValue(`cast:${id}`,value)]).filter(([,value])=>value));
  data.sceneBackgrounds=Object.fromEntries(Object.entries(data.sceneBackgrounds||{}).map(([key,value])=>[key,localImageValue(`scene:${key}`,value)]).filter(([,value])=>value));
  data.monsters=(data.monsters||[]).map((monster,index)=>{const next={...monster};const image=localImageValue(`monster:${index}`,monster.image||monster.sprite||monster.img);delete next.img;delete next.sprite;if(image)next.image=image;else delete next.image;return next});

      const sourceEnemy=scene?.enemy||(scene?.enemyName?{name:scene.enemyName}:null);

    const focus=all.find(x=>x.name&&instruction.includes(x.name));return {label:focus?`キャラクター「${focus.name}」`:'キャラクター一覧',data:focus||all};
  }
  if(activeTab==='monsters'){
    const focus=monsters.find(x=>x.name&&instruction.includes(x.name));return {label:focus?`モンスター「${focus.name}」`:'モンスター一覧',data:focus||monsters};
  }
  if(activeTab==='items'){
    const focus=items.find(x=>x.name&&instruction.includes(x.name));return {label:focus?`アイテム「${focus.name}」`:'アイテム一覧',data:focus||items};
  }
  if(activeTab==='concepts'){

  }
  const current=withSceneOverride(scene());
  if(activeTab==='state')return {label:`${current.name}のシーン要素`,data:{name:current.name,discoveries:current.discoveries||[]}};

}

依頼:
${document.querySelector('#assistantInstruction')?.value.trim()||'この対象の不足点を確認し、入力欄に記入できる具体案を1つ提示してください。'}`.trim();

plete\":false}`}

<script>
/* 出力前チェック: mock側へ書き出す前に、TAS画面で不足・参照切れを確認する。 */
function exportContractDiagnostics(payload){
  const messages=[];
  const campaign=payload?.campaign||{};
  const scenes=Array.isArray(payload?.chapter?.scenes)?payload.chapter.scenes:[];
  const companions=Array.isArray(campaign.companions)?campaign.companions:[];
  const entities=Array.isArray(campaign.entities)?campaign.entities:[];
  const entityNames=new Set(entities.map(x=>x?.ja||x?.name).filter(Boolean));
  const ids=companions.map(x=>x?.id).filter(Boolean);
  if(ids.some(id=>!/^member_\\d+$/.test(id)))messages.push({level:'error',text:'同行者IDにmember_1形式でない値があります。'});
  if(new Set(ids).size!==ids.length)messages.push({level:'error',text:'同行者IDが重複しています。'});
  scenes.forEach((scene,index)=>{
    const label=scene.name||`シーン${index+1}`;
    if(!scene.name)messages.push({level:'warn',text:`${label}: シーン名が未設定です。`});
    if(!scene.brief)messages.push({level:'warn',text:`${label}: 開始時の説明が未設定です。`});
    if(scene.enemy?.name&&!entityNames.has(scene.enemy.name))messages.push({level:'error',text:`${label}: 敵「${scene.enemy.name}」がエンティティ台帳にありません。`});
    (scene.loot||[]).forEach(item=>{const name=typeof item==='string'?item:item?.name;if(name&&!entityNames.has(name))messages.push({level:'error',text:`${label}: 入手品「${name}」がエンティティ台帳にありません。`})});
  });
  const assetRefs=Object.values(payload?.assets||{}).flatMap(asset=>asset?.usedBy||[]);
  if(assetRefs.some(ref=>/campaign\\.companions\\.(gareth|lydia)\\.sprite/.test(ref)))messages.push({level:'error',text:'画像参照に旧同行者IDが残っています。'});
  if(!messages.length)messages.push({level:'ok',text:'出力契約上の必須項目と参照関係に問題ありません。'});
  return messages;
}

<script>
/* campaign.jsonとchapter_XX.jsonを同時に選択したゲーム出力JSONの再読込。 */
async function loadCampaignFiles(fileList){
  const files=Array.from(fileList||[]);
  if(!files.length)return;
  if(files.length===1){loadCampaignFile(files[0]);return}
  try{
    const values=await Promise.all(files.map(file=>file.text().then(text=>({name:file.name,data:JSON.parse(text)}))));
    let campaign=null,chapter=null;
    values.forEach(({name,data:raw})=>{
      const data=raw?.data&&typeof raw.data==='object'?raw.data:raw;
      if(data?.campaign&&data?.chapter){campaign=data.campaign;chapter=data.chapter;return}
      if(data?.companions||data?.style||data?.meta)campaign=data;
      if(data?.scenes||data?.quest||data?.intro)chapter=data;
      if(/^campaign\.json$/i.test(name))campaign=data;
      if(/^chapter_\d+\.json$/i.test(name))chapter=data;
    });
    if(!campaign||!chapter)throw new Error('campaign.jsonとchapter_XX.jsonを選択してください');
    const draft=gamePayloadToWorkspaceDraft({campaign,chapter});
    if(!draft)throw new Error('ゲーム出力JSONの形式を認識できません');
    applyWorkspaceDraft(draft);saveWorkspaceDraft();renderScenes();renderAll();
    setStatus('ゲーム出力JSONを'+files.length+'件読み込みました');
  }catch(error){setStatus('読込に失敗しました: '+error.message)}
}

    return slotId?{...entry,id:slotId,ja:companion?.name||entry.ja||entry.name}:entry;
  }):campaign.entities;
  const assets=payload.assets&&typeof payload.assets==='object'?Object.fromEntries(Object.entries(payload.assets).map(([assetId,asset])=>[assetId,{...asset,usedBy:Array.isArray(asset?.usedBy)?asset.usedBy.map(ref=>{
    const match=String(ref).match(/^campaign\.companions\.([^\.]+)\.sprite$/);
    const slotId=match?companionSlotByRef.get(match[1]):null;
    return slotId?`campaign.companions.${slotId}.sprite`:ref;
  }):asset.usedBy}])):payload.assets;
  return {...payload,campaign:{...campaign,companions,entities,castAttributes:attributes},assets};
}
function unifiedNormalizeSemantics(payload){
  ensureConcepts();
  ensureItems();
  const campaign={...(payload?.campaign||{})};
  const conceptsOut=concepts.map(entry=>({
    id:entry.id,ja:entry.name,aliases:entry.aliases,kind:'concept',role:entry.role,
    usage:entry.usage,scope:entry.scope,storyKey:entry.storyKey,surface:entry.surface,truth:entry.truth
  }));
  const itemsOut=items.filter(entry=>entry.name).map(entry=>({
    id:entry.id,ja:entry.name,aliases:entry.aliases||[],kind:'item',parentConceptId:entry.parentConceptId||null,
    scope:entry.scope||'scene',acquisition:entry.acquisition||'none',persistent:Boolean(entry.persistent),
    capabilities:entry.capabilities||['inspect'],requires:entry.requires||'',surface:entry.notes||'',visual:entry.image||''
  }));
  const existing=Array.isArray(campaign.entities)?campaign.entities:[];
  const byName=new Map(existing.filter(entry=>entry&&(entry.ja||entry.name)).map(entry=>[entry.ja||entry.name,entry]));
  conceptsOut.forEach(entry=>byName.set(entry.ja,entry));
  itemsOut.forEach(entry=>byName.set(entry.ja,entry));
  return {...payload,campaign:{
    ...campaign,concepts:conceptsOut,items:itemsOut,
    initialInventory:items.filter(entry=>entry.name&&entry.acquisition==='starting_inventory').map(entry=>entry.name),
    initialInventoryIds:items.filter(entry=>entry.name&&entry.acquisition==='starting_inventory').map(entry=>entry.id),
    entities:Array.from(byName.values())
  }};
}
function unifiedNormalizeEntityLedger(payload){
  const entities=ensureEntityLedger().map(entry=>({
    id:entry.id,ja:entry.name,aliases:entry.aliases,kind:entry.kind,importance:entry.importance,
    surface:entry.surface,truth:entry.truth,visual:entry.image||'',affordances:entry.affordances
  }));
  return {...payload,campaign:{...(payload?.campaign||{}),entities}};
}
function unifiedNormalizeEncounters(payload){
  if(!Array.isArray(payload?.chapter?.scenes))return payload;
  const nodes=chapterNodes().filter(node=>node.type==='scene');
  const scenes=payload.chapter.scenes.map((raw,index)=>{
    const node=nodes[index];
    const encounters=(node?.encounters||raw.encounters||[]).map(normalizeEncounter);
    return encounters.length?{...raw,encounters}:raw;
  });
  return {...payload,chapter:{...payload.chapter,scenes}};
}
function unifiedNormalizeChapterIntro(payload){
  const chapter=payload?.chapter||{};
  const openingOverride=sceneOverrides[nodeKey({type:'opening',id:'opening'})]||{};
  const authoredIntro=String(openingOverride.brief||'').trim();
  const existingIntro=typeof chapter.intro==='string'?chapter.intro.trim():'';
  return {...payload,chapter:{...chapter,intro:authoredIntro||existingIntro||null}};
}
function unifiedNormalizeSceneNpcs(payload){
  if(!Array.isArray(payload?.chapter?.scenes))return payload;
  const nodes=chapterNodes().filter(node=>node.type==='scene');
  const scenes=payload.chapter.scenes.map((sceneData,index)=>{
    const node=nodes[index]||{};
    const npcId=(sceneData.npcs||node.npcs||[])[0];
    if(!npcId)return sceneData;
    const npc=npcList().find(entry=>entry.id===npcId);
    if(!npc)return sceneData;
    const sprite=runtimeImageName(castImages[npcId]);
    const next={...sceneData,npc:{id:npc.id,name:npc.name}};
    if(sprite)next.npcSprite=sprite;
    delete next.npcs;
    return next;
  });
  return {...payload,chapter:{...payload.chapter,scenes}};
}
function unifiedApplyFlagContract(payload){
  ensureFlagConfig();
  const campaign={...(payload?.campaign||{}),flags:flagDeclarations};
  const style={...(campaign.style||{})};
  if(gameOverText.trim())style.gameOverText=gameOverText.trim();
  else delete style.gameOverText;
  campaign.style=style;
  const chapter={...(payload?.chapter||{})};
  const rules=flagRulesForChapter();
  const declaredOut=Array.isArray(chapter.flagsOut)?chapter.flagsOut:[];
  chapter.flagsOut=[...new Set([...declaredOut,...Object.keys(rules)])];
  chapter.flagRules=rules;
  const nodes=chapterNodes().filter(node=>node.type==='scene');
  chapter.scenes=(chapter.scenes||[]).map((raw,index)=>{
    const node=nodes[index];
    const dialogue=(node&&sceneOverrides[nodeKey(node)]?.dialogueRules||[]).map(normalizeDialogueRule);
    const stateUpdates=dialogue.filter(rule=>rule.eventType==='flag_set').map(rule=>{
      const match=String(rule.targetId||'').match(/^([^=]+)=(.*)$/);
      return match?{type:'flag_set',flag:match[1].trim(),value:match[2].trim(),condition:rule.condition||'',once:rule.once!==false}:null;
    }).filter(Boolean);
    return stateUpdates.length?{...raw,stateUpdates}:raw;
  });
  return {...payload,campaign,chapter};
}
function unifiedNormalizeRuntimeIds(payload){
  const source=flagChapterSource(activeChapter);
  const sourceScenes=Array.isArray(source.scenes)?source.scenes:[];
  if(!Array.isArray(payload?.chapter?.scenes))return payload;
  const scenes=payload.chapter.scenes.map((sceneData,index)=>{
    const oldSecrets=sourceScenes[index]?.secrets||[];
    const next={...sceneData};
    if(Array.isArray(next.secrets)&&oldSecrets.length)next.secrets=next.secrets.map((secret,secretIndex)=>({...secret,id:oldSecrets[secretIndex]?.id||secret.id}));
    if(Array.isArray(next.exits))next.exits=next.exits.map(exit=>{
      const ref=String(exit.to??'').match(/^scene:(\d+)$/);
      return ref?{...exit,to:Number(ref[1])}:exit;
    });
    return next;
  });
  return {...payload,chapter:{...payload.chapter,scenes}};
}
function unifiedRemoveUnusedTheme(payload){
  if(!payload?.campaign)return payload;
  const campaign={...payload.campaign};
  delete campaign.theme;
  if(campaign.style){campaign.style={...campaign.style};delete campaign.style.theme}
  return {...payload,campaign};
}
function mockCampaignPayloadUnified(){
  /* エンティティ台帳変換以降の処理は旧チェーンの直前から取り出し、この統合層で確定する。
     他の層も同じ手順で順番にここへ移す。 */
  const source=baseMockCampaignPayloadForEntityLedger();
  let normalized=unifiedNormalizeEntityLedger(source);
  normalized=unifiedNormalizeSemantics(normalized);
  normalized=unifiedNormalizeCompanions(normalized);
  normalized=unifiedNormalizeSceneNpcs(normalized);
  normalized=unifiedApplyFlagContract(normalized);
  normalized=unifiedNormalizeRuntimeIds(normalized);
  normalized=unifiedRemoveUnusedTheme(normalized);
  normalized=unifiedNormalizeChapterIntro(normalized);
  normalized=unifiedNormalizeEncounters(normalized);
  normalized=unifiedNormalizeAssets(normalized);
  return cloneOutputValue(normalized);
}
window.__tasOutputPipelines={
  legacy:()=>cloneOutputValue(legacyMockCampaignPayloadForUnified()),
  unified:()=>cloneOutputValue(mockCampaignPayloadUnified())
};
/* 統合版を実運用の出力経路へ昇格する。旧経路は上記の比較入口に保持する。 */
mockCampaignPayload=mockCampaignPayloadUnified;
</script>
