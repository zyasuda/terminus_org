er);background:transparent;color:var(--text);padding:4px 8px;font-size:12px}.card-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}.card-head h3{margin:0;display:flex;align-items:center;gap:18px;flex-wrap:wrap}.card-head .meta-chip{margin-left:8px}.delete-btn{border-color:var(--danger);color:var(--danger);padding:3px 8px;font-size:12px}.delete-btn:disabled{border-color:var(--border);color:var(--dim)}.readonly-field{width:100%;background:#171c23;border:1px solid var(--border);border-radius:4px;color:var(--dim);padding:7px 8px}.prompt-box{width:100%;min-height:140px;background:#171c23;border:1px solid var(--border);border-radius:4px;color:var(--text);padding:8px;resize:vertical}.sr-only{display:none}.state-toolbar{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:10px}.toolbar-actions{display:flex;gap:8px;flex-wrap:wrap}.state-discovery{border:1px solid var(--border);border-radius:6px;background:#1b2129;padding:12px;margin-top:10px}.state-discovery:first-of-type{margin-top:0}.state-discovery.collapsed{padding-bottom:10px}.state-discovery-body{display:block}.state-discovery.collapsed .state-discovery-body{display:none}.discovery-summary{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}.summary-chip{border-color:#4a5768;background:#222c37;color:#d7e0ea}.state-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.state-grid .field{margin:0}.state-grid .field.span-2{grid-column:1 / -1}.section-divider{margin:14px 0 10px;padding-top:12px;border-top:1px solid var(--border)}.section-divider h4{margin:0 0 4px;color:var(--accent);font-size:12px}.section-divider p{margin:0;color:var(--dim);font-size:12px}.empty-card{padding:16px;border:1px dashed var(--border);border-radius:6px;background:#1a2028}.meta-row{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}.meta-row .chip{cursor:default}.collapse-btn{border-color:var(--border); <body>
<header><h1>TAS MVP</h1><span class="meta">ストーリー制作ワークスペース</span><span class="spacer"></span><div class="top-actions"><div class="switch-row" style="gap:8px"><span>補助パネル</span><label class="switch"><input type="checkbox" id="toggleRightSwitch"><span class="slider"></span></label></div><button class="ghost" id="btnSaveDraft">保存</button><button class="ghost" id="btnLoadCampaign">読込</button><input class="sr-only" type="file" id="campaignFileInput" accept="application/json"><button id="btnBuild">出力確認</button></div></header>
<main>
  <section class="panel scene-panel"><div class="panel-title">キャンペーン</div><div id="sceneList" class="scene-list"></div><div class="bottom"><button class="sub" id="btnNewScene">＋ シーン</button><button class="sub" id="btnNewChapter">＋ チャプター</button><button class="sub" id="btnNewCampaign">＋ キャンペーン</button></div></section>
  <section class="panel workspace"><div class="tabs" id="layerTabs"></div><div id="tabContent" class="tab-content"></div></section>
  <aside id="rightPanel" class="panel right-panel"><div class="panel-title">補助パネル</div><div id="rightBody" class="right-body"></div><div class="bottom"><span id="status" class="status">準備中…</span></div></aside>
</main>
<script>
let assistantMode="prompt";let assistantAiResult="";
const DRAFT_KEY="tas_campaign_draft_v1";const $=id=>document.getElementById(id);let context=null;let activeTab="world";let activeChapter="ch1";let selectedNode={type:"scene",index:0};let history=[];let draft="";let review="";let rightPanelEnabled=false;const DEFAULT_CAMPAIGN_NAME="ランタンヒル年代記";const DEFAULT_CAMPAIGN_WORLD="ミステリ / ロー・ファンタジー。静かで神秘的、少し切ない。";const DEFAULT_CAMPAIGN_THEME="孤独、献身、継承";const DEFAULT_CAMPAIGN_TERMS="現代語彙を避ける。正名はエンティティ台帳に合わせる。";let campaignName=DEFAULT_CAMPAIGN_NAME;let campaignImage="";let campaignWorld=DEFAULT_CAMPAIGN_WORLD;let campaignTheme=DEFAULT_CAMPAIGN_THEME;let campaignTerms=DEFAULT_CAMPAIGN_TERMS;let extraCompanions=0;let npcCount=1;let monsters=[];let items=[];let castImages={};let castNames={};let castProfiles={};let castFlags={};let sceneBackgrounds={};let sceneOverrides={};let discoveryFoldState={};let pendingCastFocus=null;let collapsedCampaign=false;let collapsedChapters={ch1:false,ch2:false};
const fallbackScenes=[{id:1,name:"坑道の入口前",brief:"古いレールと木札がある。奥から金属音が聞こえる。",goal:"札とレールを確認し、奥へ進む",discoveries:["作業札","トロッコ軌道"]},{id:2,name:"分かれ道",brief:"封鎖の木柵と左右の坑道。奥に灯りが揺れる。",goal:"第三坑道へ入る手段を見つける",discoveries:["封鎖の木柵","油の匂い"]},{id:3,name:"坑道の最奥",brief:"ランタンを持つ人影がこちらを向く。",goal:"灯りの主と決着する",discoveries:["灯りの主の正体","動力と坑道維持"]},{id:4,name:"村への帰還",brief:"村の広場。マイラの家に灯りがともる。",goal:"マイラの家へ入る",discoveries:[]},{id:5,name:"マイラの部屋",brief:"マイラが報告を待っている。",goal:"見聞きしたことを報告する",discoveries:[]}];
let freshCampaign=false;let customChapterScenes={ch1:[],ch2:[]};let chapterNames={ch1:"",ch2:""};let chapterOrder=["ch1"];
const chapterData=()=>{if(freshCampaign)return {title:activeChapter==="ch2"?"新しい章":"新しい章",scenes:Array.isArray(customChapterScenes[activeChapter])?customChapterScenes[activeChapter]:[]};try{const file=activeChapter==="ch2"?"chapter_02.json":"chapter_01.json";const raw=context?.dataFiles?.[file]||context?.dataFiles?.["chapter_01.json"];if(raw)return JSON.parse(raw)}catch(e){}return {title:activeChapter==="ch2"?"心石の在処":"廃坑の灯",scenes:activeChapter==="ch2"?fallbackScenes.slice(0,2):fallbackScenes}};

const nodeKey=(n,chapter=activeChapter)=>`${chapter}:${n.type}:${n.index??n.type}`;
const withSceneOverride=n=>{const merged={...n,...(sceneOverrides[nodeKey(n)]||{})};const discoveries=Array.isArray(merged.discoveries)?merged.discoveries:Array.isArray(merged.secrets)?merged.secrets:null;const {secrets,...rest}=merged;return discoveries?{...rest,discoveries:discoveries.map((x,i)=>normalizeDiscoveryFor(merged,x,i))}:rest};
const chapterNodes=()=>{const d=chapterData();return [{type:"opening",id:"opening",name:"オープニング",brief:d.opening?.brief||d.intro||"依頼と今回の目的を提示する。",goal:d.opening?.goal||"依頼を受け、坑道へ向かう目的を理解する。"},...currentScenes().map((s,index)=>({...s,type:"scene",index,name:s.name||fallbackScenes[index]?.name||`シーン${s.id??index+1}`})),{type:"ending",id:"ending",name:"エンディング",brief:d.ending?.brief||"依頼の結果を締めくくり、章の余韻を残す。",goal:d.ending?.goal||"今回の依頼を報告し、章の成果を確定する。"},{type:"intermission",id:"intermission",name:"インターミッション",brief:d.intermission?.brief||"章と章の間をつなぐ。次の依頼や世界の変化を整理する。",goal:d.intermission?.goal||"次章への持ち越し情報を確定する。"}].map(withSceneOverride)};
const scene=()=>chapterNodes().find(n=>n.type===selectedNode.type&&n.index===selectedNode.index)||chapterNodes()[0];
const sceneKey=()=>nodeKey(selectedNode);
const sceneRef=n=>n.type==="scene"?`scene:${n.id}`:n.type;
const sceneRefLabel=n=>n.type==="scene"?`シーン${n.id}：${n.name}`:n.name;
const sceneTargets=()=>chapterNodes().filter(n=>sceneRef(n)!==sceneRef(scene()));
const TRANSITION_TYPES=[
  ["flag","フラグ"],["discovery","発見項目"],["item","所持アイテム"],
  ["check","判定結果"],["combat","戦闘結果"],["conversation","会話結果"]
];
const DISCOVERY_CATEGORIES=[["main","メイン進行"],["place","場所・背景"],["image","画像内要素"],["sense","音・匂い・感覚"],["object","調査対象"],["foreshadow","伏線・世界設定"],["npc","人物・痕跡"]];
const DISCOVERY_IMPORTANCE=[["major","主線"],["support","補助"],["flavor","演出"]];
const DISCOVERY_TEMPLATE_SETS=[
  {category:"main",importance:"major",label:"進行に関わる要素",surface:"プレイヤーが必ず認識する導線や障害。",trigger:"最初の確認動作",fact:"このシーンの進行に必要な事実を記録する。",tags:["主線確認"]},
  {category:"place",importance:"support",label:"場所の違和感",surface:"地形や配置、使われ方の不自然さ。",trigger:"周囲を見る",fact:"場所に関する確定情報を記録する。",tags:["背景観察"]},
  {category:"image",importance:"support",label:"画像で目に入るもの",surface:"立ち絵や背景画像で視認できる要素。",trigger:"画像を確認する",fact:"視覚情報から分かる確定事実を記録する。",tags:["視認済み"]},
  {category:"sense",importance:"flavor",label:"匂い・音・気配",surface:"音、匂い、温度、違和感など。",trigger:"耳を澄ます / 匂いを確かめる",fact:"感覚的に把握できる確定情報を記録する。",tags:["感覚手掛かり"]},
  {category:"object",importance:"support",label:"補助的な調査対象",surface:"本筋でなくても触れられる小物や痕跡。",trigger:"個別に調べる",fact:"寄り道で得られる追加情報を記録する。",tags:["寄り道"]},
  {category:"foreshadow",importance:"flavor",label:"伏線・世界設定",surface:"今は意味が分からないが後で効く要素。",trigger:"違和感として拾う",fact:"後続シーンで参照したい伏線を記録する。",tags:["伏線"]}
];
const DIALOGUE_SPEAKERS=[["gm","GM"],["member","メンバー"],["npc","NPC"],["system","システム"]];
const DIALOGUE_PRIORITIES=[["high","高"],["medium","中"],["low","低"]];
const DIALOGUE_EVENTS=[["","なし"],["flag_add","フラグ付与"],["item_grant","アイテム付与"],["npc_join","NPC参加"],["scene_unlock","シーン解放"],["battle_start","バトル開始"],["discovery_reveal","要素開示"]];
const transitionTypeLabel=id=>TRANSITION_TYPES.find(([key])=>key===id)?.[1]||"フラグ";
const normalizeTransition=t=>({conditionType:(t.conditionType||t.type)==="secret"?"discovery":t.conditionType||t.type||"flag",conditionValue:t.conditionValue??t.value??t.condition??"",target:t.target||""});
const conditionTypeFromValue=(value,n=scene())=>{const raw=String(value||"").trim();const prefix=raw.match(/^([a-z]+)\s*:/i)?.[1]?.toLowerCase();if(prefix&&TRANSITION_TYPES.some(([id])=>id===prefix))return prefix;const key=raw.toLowerCase();const discoveries=(n?.discoveries||[]).map((x,i)=>normalizeDiscoveryFor(n,x,i));if(discoveries.some(x=>x.id.toLowerCase()===key||x.label===raw))return "discovery";const flags=discoveries.flatMap(x=>(Array.isArray(x.tags)?x.tags:String(x.tags||"").split(",")).map(v=>String(v).trim().toLowerCase()).filter(Boolean));if(flags.includes(key))return "flag";return prefix||"flag"};
const conditionTypeHint=(value,n=scene())=>{const type=conditionTypeFromValue(value,n);return value?transitionTypeLabel(type):"入力待ち"};
const slugifyKeyPart=(value,fallback)=>String(value||"").normalize("NFKC").toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"")||fallback;

const discoveryKey=(value,index,n=scene())=>`${discoveryKeyPrefixFor(n)}_${slugifyKeyPart(value,`item_${index+1}`)}`;

const joinList=value=>parseList(value).join(", ");

const discoveryTemplate=(template,index,n=scene())=>{const label=template.label||`発見項目${index+1}`;return normalizeDiscoveryFor(n,{...template,label,id:discoveryKey(label,index,n)},index)};

const eventLabel=value=>DIALOGUE_EVENTS.find(([id])=>id===value)?.[1]||"イベントなし";
const dialogueEventMeta=eventType=>({
  "":{label:"対象",placeholder:"なし",mode:"none"},
  flag_add:{label:"付与するフラグ",placeholder:"例：封鎖の木柵調査済",mode:"flag"},
  item_grant:{label:"付与するアイテム",placeholder:"例：old_bag",mode:"text"},
  npc_join:{label:"参加するNPC",placeholder:"例：npc_1",mode:"npc"},

ption>`).join("")}</select></div><div class="field"><label>優先度</label><select class="dialogue-priority" data-dialogue-index="${i}">${DIALOGUE_PRIORITIES.map(([id,label])=>`<option value="${id}" ${rule.priority===id?"selected":""}>${label}</option>`).join("")}</select></div><div class="field span-2"><label>発火条件（要素名をそのまま。AND / OR 可。常時なら空欄）</label><input class="dialogue-condition" data-dialogue-index="${i}" list="discoveryNameList" value="${escapeHtml(rule.condition)}" placeholder="例：封鎖の木柵"></div><div class="field span-2"><label>発言内容</label><textarea class="dialogue-line" data-dialogue-index="${i}" placeholder="調査結果に応じて表示する発言">${escapeHtml(rule.line)}</textarea></div><div class="field"><label>発火イベント</label><select class="dialogue-event-type" data-dialogue-index="${i}">${DIALOGUE_EVENTS.map(([id,label])=>`<option value="${id}" ${rule.eventType===id?"selected":""}>${label}</option>`).join("")}</select></div>${meta.mode==="none"?`<div class="field"><label>${meta.label}</label><div class="readonly-field">対象なし</div></div>`:options.length?`<div class="field"><label>${meta.label}</label><select class="dialogue-target-id" data-dialogue-index="${i}"><option value="">選択してください</option>${options.map(option=>`<option value="${escapeHtml(option.value)}" ${rule.targetId===option.value?"selected":""}>${escapeHtml(option.label)}</option>`).join("")}</select></div>`:`<div class="field"><label>${meta.label}</label><input class="dialogue-target-id" data-dialogue-index="${i}" value="${escapeHtml(rule.targetId)}" placeholder="${escapeHtml(meta.placeholder)}"></div>`}<div class="field span-2"><label>対象表示名 / 補足</label><input class="dialogue-target-label" data-dialogue-index="${i}" value="${escapeHtml(selectedLabel)}" placeholder="必要ならGM向けの表示名を補足"></div><div class="field span-2"><label>イベント補足</label><input class="dialogue-event-notes" data-dialogue-index="${i}" value="${escapeHtml(rule.eventNotes)}" placeholder="数量、演出、例外条件などを補足"></div><div class="field"><label><input type="checkbox" class="dia renderStructure=()=>{const s=scene();const key=sceneKey();const label=s.type==="opening"?"オープニング":s.type==="intermission"?"インターミッション":s.type==="ending"?"エンディング":`シーン${s.id}`;const bg=sceneBackgrounds[key]?`<img src="${sceneBackgrounds[key]}">`:"背景画像なし";const selectedNpcs=new Set(s.npcs||[]);const npcChecks=npcList().map(n=>`<label class="check-row"><input type="checkbox" class="scene-npc" value="${n.id}" ${selectedNpcs.has(n.id)?"checked":""}>${escapeHtml(n.name)}</label>`).join("")||"<p class='hint'>キャスト／エージェントでNPCを登録すると、ここに表示されます。</p>";const exits=sceneExits();return `<h2>${label}の設定</h2><p class="hint">このシーンの背景、開始時の説明、登場NPC、次のシーンへの進み方を設定します。</p><div class="field"><label>背景画像</label><div class="scene-bg">${bg}</div><input type="file" accept="image/*" id="sceneBgInput"></div><div class="field"><label>名称</label><input id="sceneName" value="${escapeHtml(s.name)}"></div><div class="field"><label>開始時の説明</label><textarea id="sceneBrief">${escapeHtml(s.brief)}</textarea></div><div class="field"><label>登場NPC</label><div class="check-list">${npcChecks}</div></div><div class="field"><label>このシーンの敵（モンスタータブで登録）</label><select id="sceneEnemy"><option value="">なし</option>${monsters.filter(m=>m.name).map(m=>`<option value="${escapeHtml(m.name)}" ${s.enemyName===m.name?"selected":""}>${escapeHtml(m.name)}（HP ${Number(m.hp)||10}）</option>`).join("")}</select></div><div class="field"><label>シーンの出口・分岐</label><p class="exit-help">プレイヤーの移動意図に含まれる照合語で出口を選びます。複数一致時は上から順に優先します。条件は発見項目キー・項目名をAND/ORで指定できます。</p><datalist id="discoveryNameList">${(s.discoveries||[]).map((v,j)=>normalizeDiscoveryFor(s,v,j)).map(x=>`<option value="${escapeHtml(x.label)}">`).join("")}</datalist><div class="transition-list">${exits.map((x,i)=>{const to=x.to===null?"__dead_end__":x.to;return `<div class="exit-row"><div class="field"><label>出口ID</label><input class="exit-id" data-exit-index="${i}" value="${escapeHtml(x.id)}" placeholder="right"></div><div class="field"><label>照合語（カンマ区切り）</label><input class="exit-match" data-exit-index="${i}" value="${escapeHtml(x.match.join(", "))}" placeholder="右, 柵, 奥"></div><div class="field"><label>移動先</label><select class="exit-target" data-exit-index="${i}"><option value="">選択してください</option>${exitTargetOptions().replace(`value="${escapeHtml(to)}"`,`value="${escapeHtml(to)}" selected`)}</select></div><div class="field"><label>必要条件（キー/項目名 AND/OR）</label><input class="exit-requires" data-exit-index="${i}" list="discoveryNameList" value="${escapeHtml(exitRequiresText(x))}" placeholder="s2a OR s2b"></div><button class="sub" data-remove-exit="${i}">削除</button><div class="field"><label>条件未達時の説明</label><textarea class="exit-blocked" data-exit-index="${i}" placeholder="封鎖されていて進めない。">${escapeHtml(x.blockedText)}</textarea></div><div class="field"><label>行き止まり／到達時の説明</label><textarea class="exit-text" data-exit-index="${i}" placeholder="左の坑道は行き止まりだ。">${escapeHtml(x.text)}</textarea></div></div>`}).join("")}</div><div class="bottom"><button class="sub" id="btnAddExit">＋ 出口を追加</button></div></div>`};
bindStructure=()=>{const input=$("sceneBgInput");const key=sceneKey();const update=(field,value)=>{sceneOverrides[key]={...(sceneOverrides[key]||{}),[field]:value};saveWorkspaceDraft(true);renderScenes();renderRightPanel();renderValidation()};const collectExits=()=>Array.from(document.querySelectorAll(".exit-row")).map((row,i)=>normalizeExit({id:row.querySelector(`.exit-id[data-exit-index="${i}"]`)?.value.trim()||`exit_${i+1}`,match:row.querySelector(`.exit-match[data-exit-index="${i}"]`)?.value||"",to:(()=>{const v=row.querySelector(`.exit-target[data-exit-index="${i}"]`)?.value||"";return v==="__dead_end__"?null:v})(),requires:{text:row.querySelector(`.exit-requires[data-exit-index="${i}"]`)?.value.trim()||""},blockedText:row.querySelector(`.exit-blocked[data-exit-index="${i}"]`)?.value||"",text:row.querySelector(`.exit-text[data-exit-index="${i}"]`)?.value||""}));const updateExits=()=>update("exits",collectExits());const name=$("sceneName"),brief=$("sceneBrief");if(name)name.oninput=e=>update("name",e.target.value);if(brief)brief.oninput=e=>update("brief",e.target.value);document.querySelectorAll(".scene-npc").forEach(box=>box.onchange=()=>{update("npcs",Array.from(document.querySelectorAll(".scene-npc:checked")).map(x=>x.value));setStatus("登場NPCを更新しました")});const enemySel=$("sceneEnemy");if(enemySel)enemySel.onchange=e=>{update("enemyName",e.target.value);setStatus(e.target.value?`敵を設定しました: ${e.target.value}`:"敵を外しました")};document.querySelectorAll(".exit-id,.exit-match,.exit-target,.exit-requires,.exit-blocked,.exit-text").forEach(el=>{el.oninput=updateExits;el.onchange=updateExits});document.querySelectorAll("[data-remove-exit]").forEach(btn=>btn.onclick=()=>{const idx=Number(btn.dataset.removeExit);update("exits",sceneExits().filter((_,i)=>i!==idx));renderTab()});const addBtn=$("btnAddExit");if(addBtn)addBtn.onclick=()=>{update("exits",[...sceneExits(),normalizeExit({id:`exit_${sceneExits().length+1}`,match:[],to:"",requires:{text:""}})]);renderTab()};if(input)input.onchange=e=>handleImageInput(e.target.files?.[0],url=>{sceneBackgrounds[key]=url},"背景画像を保存しました")};
</script>
<script>
/* 補助パネルの利用方法を、プロンプト出力とAI実行から切り替える。 */
renderRightPanel=()=>{const s=scene();let ps=null;try{ps=playtestRuntime}catch(e){}
const stateChips=a=>a.length?a.map(x=>`<span class="chip summary-chip">${escapeHtml(x)}</span>`).join(""):`なし`;

const global=["world","cast","monsters","items","rules","export"].includes(activeTab);const globalLabel=activeTab==="world"?"キャンペーン／世界設定":activeTab==="cast"?"キャンペーン／キャスト":activeTab==="monsters"?"キャンペーン／モンスター":activeTab==="items"?"キャンペーン／アイテム":activeTab==="rules"?"キャンペーン／共通ルール":"ゲーム出力";const label=s.type==="scene"?`シーン${s.id}「${s.name}」`:s.name;let html=`<div class="right-section"><h3>現在の対象</h3><p>${global?globalLabel:`${CHAPTERS[activeChapter].name} / ${label}`}</p></div>`;if(activeTab==="playtest"){html+=`<div class="right-section"><h3>この場面の目的</h3><p>${escapeHtml(s.goal||"未設定")}</p></div><div class="right-section"><h3>プレイメモ</h3><textarea id="notes" placeholder="未解決入力、気づき、次の確認事項"></textarea></div>${stateHtml}<div class="right-section"><h3>検証（設計デバッグ）</h3><ul id="validation" class="validation"></ul></div>`}else if(activeTab==="draft"){html+=`<div class="right-section"><h3>生成レビュー</h3><p>AI APIは中央ペインから明示的に実行します。</p></div>`}else if(activeTab==="export"){html+=`<div class="right-section"><h3>出力確認</h3><p>ゲーム側へ渡すJSONの出力先と内容を確認します。</p></div>`}else{const promptMode=assistantMode==="prompt";html+=`<div class="right-section"><h3>次の操作</h3><p>${global?"この設定を確認・編集します。":"現在の対象を設計補助します。"}</p><div class="switch-row"><span>使用方法</span><span><button class="${promptMode?"":"ghost"}" data-assistant-mode="prompt">プロンプト</button><button class="${promptMode?"ghost":""}" data-assistant-mode="ai">AI使用</button></span></div>${promptMode?`<button class="sub" id="btnSuggest">プロンプトを表示</button><div id="suggestion" class="card hidden"></div>`:`<div class="field"><label>AIへの追加指示</label><textarea id="assistantInstruction" placeholder="例：世界設定の不足点を3つ、優先度順に指摘してください"></textarea></div><button id="btnAssistantAI">AIで相談</button>${assistantAiResult?`<pre class="card" id="assistantAiOutput" style="white-space:pre-wrap;max-height:320px;overflow:auto">${escapeHtml(assistantAiResult)}</pre>`:""}`}</div>${stateHtml}<div class="right-section"><h3>検証（設計デバッグ）</h3><ul id="validation" class="validation"></ul></div>`}$('rightBody').innerHTML=html;
/* クリック処理は後段の rightBody 委譲ハンドラに一本化する(直接onclickとの二重発火でLLMが2回呼ばれるバグの修正) */};

<script>
/* テキストプレイ最小ランタイム: 入力を要素・発話・イベント・遷移へ接続する。 */
let playtestRuntime={discovered:{},flags:{},items:{},npcs:{},unlocked:{},battles:{},fired:{},logs:{},notes:{}};
const playtestKey=()=>`${activeChapter}:${sceneKey()}`;
const playtestTextMatch=(text,...values)=>values.some(value=>{const raw=String(value||"").trim();return raw&&text.includes(raw)});
const playtestDiscoveryEntries=n=>(n.discoveries||[]).map((value,index)=>normalizeDiscoveryFor(n,value,index));
const playtestConditionMatches=(condition,state)=>{const raw=String(condition||"").trim();if(!raw)return true;return raw.split(/\s+OR\s+/i).some(orPart=>orPart.split(/\s+AND\s+/i).every(part=>{const token=part.trim().replace(/^(flag|discovery|item|npc|scene|battle):/i,"");return Boolean(state.flags[token]||state.discovered[token]||state.items[token]||state.npcs[token]||state.unlocked[token]||state.battles[token])}))};
const playtestState=()=>({flags:playtestRuntime.flags,discovered:playtestRuntime.discovered,items:playtestRuntime.items,npcs:playtestRuntime.npcs,unlocked:playtestRuntime.unlocked,battles:playtestRuntime.battles});
const playtestLog=(key,type,text)=>{playtestRuntime.logs[key]??=[];playtestRuntime.logs[key].push({type,text})};
const playtestTargetLabel=(eventType,targetId,rule,n)=>{const options=eventTargetOptions(eventType,n);return options.find(x=>x.value===targetId)?.label||rule.targetLabel||targetId||"対象"};
function playtestApplyEvent(rule,n){const id=String(rule.targetId||rule.targetLabel||"").trim();if(!rule.eventType)return [];const label=playtestTargetLabel(rule.eventType,id,rule,n);const notes=rule.eventNotes?`（${rule.eventNotes}）`:"";
if(rule.eventType==="discovery_reveal"&&id){const d=playtestDiscoveryEntries(n).find(x=>x.id===id||x.label===id);if(!d){playtestRuntime.discovered[id]=true;return [`要素を開示：${label}${notes}`]}if(playtestRuntime.discovered[d.id])return [];playtestRuntime.discovered[d.id]=true;if(d.label)playtestRuntime.flags[d.label]=true;d.tags.forEach(tag=>{if(tag)playtestRuntime.flags[tag]=true});const out=[`要素を開示：${d.label}${notes}`];if(d.surface)out.push(d.surface);if(d.fact)out.push(`確定事実：${d.fact}`);return out}
if(rule.eventType==="flag_add"&&id)playtestRuntime.flags[id]=true;if(rule.eventType==="item_grant"&&id)playtestRuntime.items[id]=true;if(rule.eventType==="npc_join"&&id)playtestRuntime.npcs[id]=true;if(rule.eventType==="scene_unlock"&&id)playtestRuntime.unlocked[id]=true;if(rule.eventType==="battle_start"&&id)playtestRuntime.battles[id]=true;const text=rule.eventType==="battle_start"?`バトル発生：${label}`:rule.eventType==="item_grant"?`アイテムを入手：${label}`:rule.eventType==="npc_join"?`NPCが参加：${label}`:rule.eventType==="scene_unlock"?`シーンを解放：${label}`:rule.eventType==="flag_add"?`フラグ付与：${label}`:"";return text?[`${text}${notes}`]:[]}
function playtestRevealDiscoveries(text,n,log){const found=[];for(const d of playtestDiscoveryEntries(n)){if(playtestRuntime.discovered[d.id])continue;if(playtestTextMatch(text,d.id,d.label,d.trigger,d.surface,...(d.aliases||[]))){
/* 難易度付き要素はd20判定(mock2と同じ: 20クリティカル/1ファンブル/DC以上で成功)。失敗は未発見のままで再挑戦可 */
if(d.dc){const roll=1+Math.floor(Math.random()*20);const crit=roll===20,fumble=roll===1;const ok=crit||(!fumble&&roll>=d.dc);if(log)log(`🎲 ${d.label}の判定 — d20 → ${roll} / DC ${d.dc} … ${crit?"クリティカル！":fumble?"ファンブル…":ok?"成功":"失敗"}`);if(!ok)continue}
playtestRuntime.discovered[d.id]=true;if(d.label)playtestRuntime.flags[d.label]=true;d.tags.forEach(tag=>{if(tag)playtestRuntime.flags[tag]=true});found.push(d)}}return found}
function playtestFireDialogue(text,n){const rules=(sceneOverrides[sceneKey()]?.dialogueRules||[]).map(normalizeDialogueRule).sort((a,b)=>({high:0,medium:1,low:2}[a.priority]??1)-({high:0,medium:1,low:2}[b.priority]??1));const messages=[];const firedThisTurn=new Set();
/* イベントの状態変化を受けて条件を再評価する連鎖パス。同一ターン内は各ルール1回まで、5周で打ち切り */
let changed=true,guard=0;while(changed&&guard++<5){changed=false;const state=playtestState();for(const rule of rules){const firedKey=`${sceneKey()}:${rule.id}`;if(firedThisTurn.has(firedKey))continue;if(rule.once&&playtestRuntime.fired[firedKey])continue;if(!playtestConditionMatches(rule.condition,state))continue;if(rule.line)messages.push(`${speakerLabel(rule.speaker)}：${rule.line}`);playtestApplyEvent(rule,n).forEach(m=>messages.push(m));playtestRuntime.fired[firedKey]=true;firedThisTurn.add(firedKey);changed=true}}return messages}
function playtestExitRequiresMatches(requires,state){if(!requires)return true;if(typeof requires==="string")return playtestConditionMatches(requires,state);if(requires.text)return playtestConditionMatches(requires.text,state);const any=Array.isArray(requires.secretsAny)?requires.secretsAny:[];const all=Array.isArray(requires.secretsAll)?requires.secretsAll:[];const tokenOk=token=>Boolean(state.discovered[token]||state.flags[token]||state.items[token]||state.npcs[token]||state.unlocked[token]||state.battles[token]);return (!any.length||any.some(tokenOk))&&all.every(tokenOk)&&(requires.talkTurnsMin==null||Number(requires.talkTurnsMin)<=0)}
function playtestFindExit(text,n){const exits=Array.isArray(n.exits)?n.exits.map(normalizeExit):(n.transitions||[]).map(transitionToExit);if(!exits.length)return null;return exits.find(exit=>exit.match.length&&playtestTextMatch(text,...exit.match))||null}
function playtestFindTransition(text,n){const exit=playtestFindExit(text,n);if(!exit||exit.to===null||exit.to==="end"||!playtestExitRequiresMatches(exit.requires,playtestState()))return null;return {target:String(exit.to),exit}}
function playtestMoveTo(target){if(target==="end")return true;const match=String(target||"").match(/^scene:(\d+)$/);const next=match?chapterNodes().find(x=>x.type==="scene"&&String(x.id)===match[1]):chapterNodes().find(x=>sceneRef(x)===target);if(!next)return false;selectedNode={type:next.type,index:next.index};activeTab="playtest";renderScenes();renderAll();return true}
function renderPlaytest(){const s=scene();const label=s.type==="scene"?`シーン${s.id}`:s.type==="opening"?"オープニング":s.type==="intermission"?"インターミッション":"エンディング";const key=playtestKey();const logs=playtestRuntime.logs[key]||[];const discovered=playtestDiscoveryEntries(s).filter(d=>playtestRuntime.discovered[d.id]);const status=`発見 ${discovered.length}/${playtestDiscoveryEntries(s).length}・フラグ ${Object.keys(playtestRuntime.flags).length}・所持品 ${Object.keys(playtestRuntime.items).length}`;return `<h2>テキストプレイ</h2><p class="hint">要素・会話・イベント・シーン遷移を簡易判定するプレイテストです。入力は登録済みの文言に一致した場合に反映されます。</p><div class="card"><div class="meta-row"><h3>${escapeHtml(label)}「${escapeHtml(s.name)}」</h3><span class="chip summary-chip">${escapeHtml(status)}</span></div><p class="hint">例：${escapeHtml(playtestDiscoveryEntries(s)[0]?.trigger||playtestDiscoveryEntries(s)[0]?.label||"周囲を調べる")} / 登録済みの行動を入力</p></div><div id="chat" class="chat"><p class="msg system">${escapeHtml(label)}「${escapeHtml(s.name)}」を開始しました。</p><p class="msg system">開始時の説明：${escapeHtml(s.brief||"")}</p>${logs.map(log=>`<p class="msg ${log.type===`user`?`user`:`system`}">${escapeHtml(log.text)}</p>`).join("")}</div><div class="play-input"><input id="playInput" placeholder="例：封鎖の木柵を調べる"><button id="sendPlay">送る</button></div><div class="field" style="margin-top:12px"><label>未解決入力・気づき</label><textarea id="playNotes" placeholder="この入力はどのIntentに分類すべきか">${escapeHtml(playtestRuntime.notes[key]||"")}</textarea></div>`}
function bindPlaytest(){const input=$("playInput"),chat=$("chat"),key=playtestKey(),n=scene();const append=(type,text)=>{playtestLog(key,type,text);chat.insertAdjacentHTML("beforeend",`<p class="msg ${type===`user`?`user`:`system`}">${escapeHtml(text)}</p>`);chat.scrollTop=chat.scrollHeight};const run=()=>{const text=input.value.trim();if(!text)return;append("user",`プレイヤー：${text}`);let diced=0;const found=playtestRevealDiscoveries(text,n,line=>{diced++;append("system",line)});found.forEach(d=>{append("system",`要素を発見：${d.label}`);if(d.surface)append("system",d.surface);if(d.fact)append("system",`確定事実：${d.fact}`)});playtestFireDialogue(text,n).forEach(message=>append("system",message));const transition=playtestFindTransition(text,n);if(transition){append("system",`シーン遷移：${sceneRefLabel(chapterNodes().find(x=>sceneRef(x)===transition.target)||{name:transition.target})}`);playtestMoveTo(transition.target)}else if(!found.length&&!diced){append("system","該当する要素・発話・遷移はありません。別の言い方を試すか、未解決入力に記録してください。")}input.value="";renderRightPanel()};$("sendPlay").onclick=run;input.onkeydown=e=>{if(e.key==="Enter"&&!e.isComposing&&e.keyCode!==229)run()};const notes=$("playNotes");if(notes)notes.oninput=e=>{playtestRuntime.notes[key]=e.target.value}};
</script>
<script>
/* プレイテストを再挑戦できるようにする。 */
function resetPlaytestState(){playtestRuntime={discovered:{},flags:{},items:{},npcs:{},unlocked:{},battles:{},fired:{},logs:{},notes:{}};renderAll()}
var originalPlaytestRender=renderPlaytest;
renderPlaytest=function(){return originalPlaytestRender().replace('</div><div id="chat"', '<button class="secondary" id="retryPlay" style="margin-top:10px">再挑戦</button><span class="hint" style="margin-left:8px">プレイ状態を初期化して、このシーンから開始します。</span></div><div id="chat"')}
var originalPlaytestBind=bindPlaytest;
bindPlaytest=function(){originalPlaytestBind();var retry=$('retryPlay');if(retry)retry.onclick=resetPlaytestState}
</script>
<script>
/* 新しいキャンペーンの下書きを開始する。既存の下書きは上書き前に確認する。 */
function createNewCampaign(){
  if(!window.confirm("現在のキャンペーン下書きを新しいキャンペーンで置き換えます。必要な場合は先に保存してください。続けますか？"))return;
  campaignName="新しいキャンペーン";campaignImage="";campaignWorld="";campaignTheme="";campaignTerms="";
  freshCampaign=true;customChapterScenes={ch1:[]};chapterNames={ch1:""};chapterOrder=["ch1"];activeChapter="ch1";selectedNode={type:"opening"};extraCompanions=0;npcCount=1;monsters=[];items=[];
  castImages={};castNames={};castProfiles={};castFlags={};sceneBackgrounds={};sceneOverrides={};discoveryFoldState={};
  collapsedCampaign=false;collapsedChapters={ch1:false};activeTab="world";rightPanelEnabled=false;
  saveWorkspaceDraft(true);renderScenes();renderAll();setStatus("新しいキャンペーンを作成しました");
}
function createNewScene(){
  if(!freshCampaign){setStatus("見本キャンペーンのシーンは直接変更できません。新規キャンペーンで作成してください");return}
  const scenes=[...(customChapterScenes[activeChapter]||[])];
  const nextId=scenes.reduce((max,item)=>Math.max(max,Number(item.id)||0),0)+1;
  scenes.push({id:nextId,name:`シーン${nextId}`,brief:"",goal:"",discoveries:[],exits:[]});
  customChapterScenes[activeChapter]=scenes;selectedNode={type:"scene",index:scenes.length-1};activeTab="structure";
  saveWorkspaceDraft(true);renderScenes();renderAll();setStatus(`シーン${nextId}を作成しました`);
}
function createNewChapter(){
  if(!freshCampaign){setStatus("見本キャンペーンではチャプター追加はできません。新規キャンペーンで作成してください");return}
  const nextNumber=chapterOrder.length+1;const key=`ch${nextNumber}`;
  chapterOrder=[...chapterOrder,key];customChapterScenes[key]=[];chapterNames[key]="";collapsedChapters[key]=false;CHAPTERS[key]={name:`チャプター${nextNumber}`,file:`CHAPTER_${String(nextNumber).padStart(2,"0")}`};
  activeChapter=key;selectedNode={type:"opening"};activeTab="structure";
  saveWorkspaceDraft(true);renderScenes();renderAll();setStatus(`チャプター${nextNumber}を作成しました`);
}
var newCampaignButton=$("btnNewCampaign");
if(newCampaignButton)newCampaignButton.onclick=createNewCampaign;
var newSceneButton=$("btnNewScene");
if(newSceneButton)newSceneButton.onclick=createNewScene;
var newChapterButton=$("btnNewChapter");
if(newChapterButton)newChapterButton.onclick=createNewChapter;
function deleteCurrentScene(){
  if(!freshCampaign||scene().type!=="scene")return;
  const scenes=[...(customChapterScenes[activeChapter]||[])];
  const index=Number(scene().index);
  if(!confirm(`シーン${scene().id}を削除しますか？`))return;
  scenes.splice(index,1);customChapterScenes[activeChapter]=scenes;
  selectedNode=scenes.length?{type:"scene",index:Math.min(index,scenes.length-1)}:{type:"opening"};
  saveWorkspaceDraft(true);renderScenes();renderAll();setStatus("シーンを削除しました");
}
function moveCurrentScene(delta){
  if(!freshCampaign||scene().type!=="scene")return;
  const scenes=[...(customChapterScenes[activeChapter]||[])];const index=Number(scene().index);const next=index+delta;
  if(next<0||next>=scenes.length)return;
  [scenes[index],scenes[next]]=[scenes[next],scenes[index]];customChapterScenes[activeChapter]=scenes;selectedNode={type:"scene",index:next};
  saveWorkspaceDraft(true);renderScenes();renderAll();setStatus("シーンの順番を変更しました");
}
var baseStructureRenderForFresh=renderStructure;
renderStructure=function(){
  const html=baseStructureRenderForFresh();
  if(freshCampaign&&scene().type==="opening")return html.replace(/<\/h2>/,'</h2><div class="field"><label>チャプター名</label><input id="chapterName" value="'+escapeHtml(chapterNames[activeChapter]||"")+'" placeholder="例：第一章　はじめての冒険"></div>');
  if(!freshCampaign||scene().type!=="scene")return html;
  return html.replace(/<\/div>$/,'<div class="bottom"><button class="sub" id="btnMoveSceneUp">↑ 上へ</button><button class="sub" id="btnMoveSceneDown">↓ 下へ</button><button class="delete-btn" id="btnDeleteScene">シーンを削除</button></div></div>');
};
var baseStructureBindForFresh=bindStructure;
bindStructure=function(){
  baseStructureBindForFresh();
  const chapterNameInput=$("chapterName");
  if(chapterNameInput)chapterNameInput.oninput=e=>{chapterNames[activeChapter]=e.target.value;saveWorkspaceDraft(true);renderScenes()};
  const up=$("btnMoveSceneUp"),down=$("btnMoveSceneDown"),del=$("btnDeleteScene");
  if(up)up.onclick=()=>moveCurrentScene(-1);if(down)down.onclick=()=>moveCurrentScene(1);if(del)del.onclick=deleteCurrentScene;
};
var baseRightPanelForFresh=renderRightPanel;
function currentFreshChapterLabel(){const index=Math.max(0,chapterOrder.indexOf(activeChapter))+1;return chapterNames[activeChapter]||`チャプター${index}（未命名）`}
renderRightPanel=function(){
  baseRightPanelForFresh();
  if(!freshCampaign)return;
  const target=$("rightBody")?.querySelector(".right-section p");
  if(target&&!["world","cast","monsters","items","rules","export"].includes(activeTab))target.textContent=`${currentFreshChapterLabel()} / ${scene().type==="scene"?`シーン${scene().id}「${scene().name}」`:scene().name}`;
};
var baseMockCampaignPayloadForFresh=mockCampaignPayload;
mockCampaignPayload=function(){
  const payload=baseMockCampaignPayloadForFresh();
  if(!freshCampaign)return payload;
  const chapterInfo=CHAPTERS[activeChapter]||{name:currentFreshChapterLabel(),file:`CHAPTER_${String(chapterOrder.indexOf(activeChapter)+1).padStart(2,"0")}`};
  const entities=[...monsters.map(m=>m.name),...items.map(i=>i.name)].filter(Boolean).map(ja=>({ja,note:"TAS台帳から登録"}));
  return {...payload,campaign:{meta:{title:campaignName},style:{world:campaignWorld,theme:campaignTheme,terms:campaignTerms},entities},chapter:{...payload.chapter,title:currentFreshChapterLabel(),scenes:payload.chapter?.scenes||[]},chapterFile:`${chapterInfo.file.toLowerCase()}.json`};
};
</script>
