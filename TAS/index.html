<header><h1>TAS MVP</h1><span class="meta">ストーリー制作ワークスペース</span><span class="spacer"></span><div class="top-actions"><div class="switch-row" style="gap:8px"><span>補助パネル</span><label class="switch"><input type="checkbox" id="toggleRightSwitch"><span class="slider"></span></label></div><button class="ghost" id="btnSaveDraft">保存</button><button class="ghost" id="btnLoadCampaign">読込</button><input class="sr-only" type="file" id="campaignFileInput" accept="application/json"><button id="btnBuild">出力確認</button></div></header>
<main>
  <section class="panel scene-panel"><div class="panel-title">キャンペーン</div><div id="sceneList" class="scene-list"></div><div class="bottom"><button class="sub" id="btnNewScene">＋ シーン</button><button class="sub" id="btnNewCampaign">＋ キャンペーン</button></div></section>

  <aside id="rightPanel" class="panel right-panel"><div class="panel-title">補助パネル</div><div id="rightBody" class="right-body"></div><div class="bottom"><span id="status" class="status">準備中…</span></div></aside>
</main>
<script>
let assistantMode="prompt";let assistantAiResult="";
const DRAFT_KEY="tas_campaign_draft_v1";const $=id=>document.getElementById(id);let context=null;let activeTab="world";let activeChapter="ch1";let selectedNode={type:"scene",index:0};let history=[];let draft="";let review="";let rightPanelEnabled=false;const DEFAULT_CAMPAIGN_NAME="ランタンヒル年代記";const DEFAULT_CAMPAIGN_WORLD="ミステリ / ロー・ファンタジー。静かで神秘的、少し切ない。";const DEFAULT_CAMPAIGN_THEME="孤独、献身、継承";const DEFAULT_CAMPAIGN_TERMS="現代語彙を避ける。正名はエンティティ台帳に合わせる。";let campaignName=DEFAULT_CAMPAIGN_NAME;let campaignImage="";let campaignWorld=DEFAULT_CAMPAIGN_WORLD;let campaignTheme=DEFAULT_CAMPAIGN_THEME;let campaignTerms=DEFAULT_CAMPAIGN_TERMS;let extraCompanions=0;let npcCount=1;let castImages={};let castNames={};let castProfiles={};let castFlags={};let sceneBackgrounds={};let sceneOverrides={};let discoveryFoldState={};let pendingCastFocus=null;let collapsedCampaign=false;let collapsedChapters={ch1:false,ch2:false};
const fallbackScenes=[{id:1,name:"坑道の入口前",brief:"古いレールと木札がある。奥から金属音が聞こえる。",goal:"札とレールを確認し、奥へ進む",discoveries:["作業札","トロッコ軌道"]},{id:2,name:"分かれ道",brief:"封鎖の木柵と左右の坑道。奥に灯りが揺れる。",goal:"第三坑道へ入る手段を見つける",discoveries:["封鎖の木柵","油の匂い"]},{id:3,name:"坑道の最奥",brief:"ランタンを持つ人影がこちらを向く。",goal:"灯りの主と決着する",discoveries:["灯りの主の正体","動力と坑道維持"]},{id:4,name:"村への帰還",brief:"村の広場。マイラの家に灯りがともる。",goal:"マイラの家へ入る",discoveries:[]},{id:5,name:"マイラの部屋",brief:"マイラが報告を待っている。",goal:"見聞きしたことを報告する",discoveries:[]}];
const chapterData=()=>{try{const file=activeChapter==="ch2"?"chapter_02.json":"chapter_01.json";const raw=context?.dataFiles?.[file]||context?.dataFiles?.["chapter_01.json"];if(raw)return JSON.parse(raw)}catch(e){}return {title:activeChapter==="ch2"?"心石の在処":"廃坑の灯",scenes:activeChapter==="ch2"?fallbackScenes.slice(0,2):fallbackScenes}};
const currentScenes=()=>chapterData().scenes||fallbackScenes;
const nodeKey=(n,chapter=activeChapter)=>`${chapter}:${n.type}:${n.index??n.type}`;
const withSceneOverride=n=>{const merged={...n,...(sceneOverrides[nodeKey(n)]||{})};const discoveries=Array.isArray(merged.discoveries)?merged.discoveries:Array.isArray(merged.secrets)?merged.secrets:null;const {secrets,...rest}=merged;return discoveries?{...rest,discoveries:discoveries.map((x,i)=>normalizeDiscoveryFor(merged,x,i))}:rest};
const chapterNodes=()=>{const d=chapterData();return [{type:"opening",id:"opening",name:"オープニング",brief:d.opening?.brief||d.intro||"依頼と今回の目的を提示する。",goal:d.opening?.goal||"依頼を受け、坑道へ向かう目的を理解する。"},...currentScenes().map((s,index)=>({...s,type:"scene",index,name:s.name||fallbackScenes[index]?.name||`シーン${s.id??index+1}`})),{type:"ending",id:"ending",name:"エンディング",brief:d.ending?.brief||"依頼の結果を締めくくり、章の余韻を残す。",goal:d.ending?.goal||"今回の依頼を報告し、章の成果を確定する。"},{type:"intermission",id:"intermission",name:"インターミッション",brief:d.intermission?.brief||"章と章の間をつなぐ。次の依頼や世界の変化を整理する。",goal:d.intermission?.goal||"次章への持ち越し情報を確定する。"}].map(withSceneOverride)};
const scene=()=>chapterNodes().find(n=>n.type===selectedNode.type&&n.index===selectedNode.index)||chapterNodes()[0];
const sceneKey=()=>nodeKey(selectedNode);
const sceneRef=n=>n.type==="scene"?`scene:${n.id}`:n.type;
const sceneRefLabel=n=>n.type==="scene"?`シーン${n.id}：${n.name}`:n.name;
const sceneTargets=()=>chapterNodes().filter(n=>sceneRef(n)!==sceneRef(scene()));
const TRANSITION_TYPES=[
  ["flag","フラグ"],["discovery","発見項目"],["item","所持アイテム"],
  ["check","判定結果"],["combat","戦闘結果"],["conversation","会話結果"]
];
const DISCOVERY_CATEGORIES=[["main","メイン進行"],["place","場所・背景"],["image","画像内要素"],["sense","音・匂い・感覚"],["object","調査対象"],["foreshadow","伏線・世界設定"],["npc","人物・痕跡"]];
const DISCOVERY_IMPORTANCE=[["major","主線"],["support","補助"],["flavor","演出"]];
const DISCOVERY_TEMPLATE_SETS=[
  {category:"main",importance:"major",label:"進行に関わる要素",surface:"プレイヤーが必ず認識する導線や障害。",trigger:"最初の確認動作",fact:"このシーンの進行に必要な事実を記録する。",tags:["主線確認"]},
  {category:"place",importance:"support",label:"場所の違和感",surface:"地形や配置、使われ方の不自然さ。",trigger:"周囲を見る",fact:"場所に関する確定情報を記録する。",tags:["背景観察"]},
  {category:"image",importance:"support",label:"画像で目に入るもの",surface:"立ち絵や背景画像で視認できる要素。",trigger:"画像を確認する",fact:"視覚情報から分かる確定事実を記録する。",tags:["視認済み"]},
  {category:"sense",importance:"flavor",label:"匂い・音・気配",surface:"音、匂い、温度、違和感など。",trigger:"耳を澄ます / 匂いを確かめる",fact:"感覚的に把握できる確定情報を記録する。",tags:["感覚手掛かり"]},
  {category:"object",importance:"support",label:"補助的な調査対象",surface:"本筋でなくても触れられる小物や痕跡。",trigger:"個別に調べる",fact:"寄り道で得られる追加情報を記録する。",tags:["寄り道"]},
  {category:"foreshadow",importance:"flavor",label:"伏線・世界設定",surface:"今は意味が分からないが後で効く要素。",trigger:"違和感として拾う",fact:"後続シーンで参照したい伏線を記録する。",tags:["伏線"]}
];
const DIALOGUE_SPEAKERS=[["gm","GM"],["member","メンバー"],["npc","NPC"],["system","システム"]];
const DIALOGUE_PRIORITIES=[["high","高"],["medium","中"],["low","低"]];
const DIALOGUE_EVENTS=[["","なし"],["flag_add","フラグ付与"],["item_grant","アイテム付与"],["npc_join","NPC参加"],["scene_unlock","シーン解放"],["battle_start","バトル開始"],["discovery_reveal","要素開示"]];
const transitionTypeLabel=id=>TRANSITION_TYPES.find(([key])=>key===id)?.[1]||"フラグ";
const normalizeTransition=t=>({conditionType:(t.conditionType||t.type)==="secret"?"discovery":t.conditionType||t.type||"flag",conditionValue:t.conditionValue??t.value??t.condition??"",target:t.target||""});
const conditionTypeFromValue=(value,n=scene())=>{const raw=String(value||"").trim();const prefix=raw.match(/^([a-z]+)\s*:/i)?.[1]?.toLowerCase();if(prefix&&TRANSITION_TYPES.some(([id])=>id===prefix))return prefix;const key=raw.toLowerCase();const discoveries=(n?.discoveries||[]).map((x,i)=>normalizeDiscoveryFor(n,x,i));if(discoveries.some(x=>x.id.toLowerCase()===key||x.label===raw))return "discovery";const flags=discoveries.flatMap(x=>(Array.isArray(x.tags)?x.tags:String(x.tags||"").split(",")).map(v=>String(v).trim().toLowerCase()).filter(Boolean));if(flags.includes(key))return "flag";return prefix||"flag"};
const conditionTypeHint=(value,n=scene())=>{const type=conditionTypeFromValue(value,n);return value?transitionTypeLabel(type):"入力待ち"};
const slugifyKeyPart=(value,fallback)=>String(value||"").normalize("NFKC").toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"")||fallback;
const discoveryKeyPrefixFor=n=>`${activeChapter}_${n?.type==="scene"?`s${n.id}`:slugifyKeyPart(n?.type,"section")}`;
const discoveryKey=(value,index,n=scene())=>`${discoveryKeyPrefixFor(n)}_${slugifyKeyPart(value,`item_${index+1}`)}`;

const joinList=value=>parseList(value).join(", ");

const discoveryTemplate=(template,index,n=scene())=>{const label=template.label||`発見項目${index+1}`;return normalizeDiscoveryFor(n,{...template,label,id:discoveryKey(label,index,n)},index)};
const speakerLabel=value=>DIALOGUE_SPEAKERS.find(([id])=>id===value)?.[1]||"話者未設定";
const eventLabel=value=>DIALOGUE_EVENTS.find(([id])=>id===value)?.[1]||"イベントなし";
const dialogueEventMeta=eventType=>({
  "":{label:"対象",placeholder:"なし",mode:"none"},
  flag_add:{label:"付与するフラグ",placeholder:"例：封鎖の木柵調査済",mode:"flag"},
  item_grant:{label:"付与するアイテム",placeholder:"例：old_bag",mode:"text"},
  npc_join:{label:"参加するNPC",placeholder:"例：npc_1",mode:"npc"},
  scene_unlock:{label:"解放するシーン",placeholder:"例：scene:4",mode:"scene"},
  battle_start:{label:"開始するバトル",placeholder:"例：battle_mine_guard",mode:"text"},
  discovery_reveal:{label:"開示する要素",placeholder:"例：s2a",mode:"discovery"}

renderStructure=()=>{const s=scene();const key=sceneKey();const label=s.type==="opening"?"オープニング":s.type==="intermission"?"インターミッション":s.type==="ending"?"エンディング":`シーン${s.id}`;const bg=sceneBackgrounds[key]?`<img src="${sceneBackgrounds[key]}">`:"背景画像なし";const selectedNpcs=new Set(s.npcs||[]);const npcChecks=npcList().map(n=>`<label class="check-row"><input type="checkbox" class="scene-npc" value="${n.id}" ${selectedNpcs.has(n.id)?"checked":""}>${escapeHtml(n.name)}</label>`).join("")||"<p class='hint'>キャスト／エージェントでNPCを登録すると、ここに表示されます。</p>";const transitions=(Array.isArray(s.transitions)&&s.transitions.length?s.transitions:(s.type==="scene"&&s.id===1?[{trigger:"奥へ進む",requires:"",target:"scene:2"}]:[{trigger:"",requires:"",target:""}])).map(normalizeTransitionSimple);return `<h2>${label}の設定</h2><p class="hint">このシーンの背景、開始時の説明、登場NPC、次のシーンへの進み方を設定します。</p><div class="field"><label>背景画像</label><div class="scene-bg">${bg}</div><input type="file" accept="image/*" id="sceneBgInput"></div><div class="field"><label>名称</label><input id="sceneName" value="${escapeHtml(s.name)}"></div><div class="field"><label>開始時の説明</label><textarea id="sceneBrief">${escapeHtml(s.brief)}</textarea></div><div class="field"><label>登場NPC</label><div class="check-list">${npcChecks}</div></div><div class="field"><label>シーン遷移</label><p class="hint">例：行動「奥へ進む」だけでシーン2へ。条件が必要な場合だけ、発見済み名を AND / OR で指定します。</p><div class="transition-list">${transitions.map((t,i)=>`<div class="transition-row"><div class="field"><label>プレイヤーの行動</label><input class="transition-trigger" data-transition-index="${i}" value="${escapeHtml(t.trigger)}" placeholder="奥へ進む"></div><div class="field"><label>必要な発見済み条件</label><input class="transition-requires" data-transition-index="${i}" value="${escapeHtml(t.requires)}" placeholder="例：封鎖の木柵調査済 AND 油の匂い発見済（不要なら空欄）"></div><div class="field"><label>移動先</label><select class="transition-target" data-transition-index="${i}"><option value="">選択してください</option>${sceneTargets().map(n=>`<option value="${escapeHtml(sceneRef(n))}" ${t.target===sceneRef(n)?"selected":""}>${escapeHtml(sceneRefLabel(n))}</option>`).join("")}</select></div><button class="sub" data-remove-transition="${i}">削除</button></div>`).join("")}</div><div class="bottom"><button class="sub" id="btnAddTransition">＋ 遷移を追加</button></div></div>`};
bindStructure=()=>{const input=$("sceneBgInput");const key=sceneKey();const update=(field,value)=>{sceneOverrides[key]={...(sceneOverrides[key]||{}),[field]:value};renderScenes();renderRightPanel();renderValidation()};const updateTransitions=()=>{const transitions=Array.from(document.querySelectorAll(".transition-row")).map((row,i)=>({trigger:row.querySelector(`.transition-trigger[data-transition-index="${i}"]`)?.value.trim()||"",requires:row.querySelector(`.transition-requires[data-transition-index="${i}"]`)?.value.trim()||"",conditionValue:row.querySelector(`.transition-requires[data-transition-index="${i}"]`)?.value.trim()||"",target:row.querySelector(`.transition-target[data-transition-index="${i}"]`)?.value||""})).filter(t=>t.trigger||t.requires||t.target);update("transitions",transitions)};const name=$("sceneName"),brief=$("sceneBrief");if(name)name.oninput=e=>update("name",e.target.value);if(brief)brief.oninput=e=>update("brief",e.target.value);document.querySelectorAll(".scene-npc").forEach(box=>box.onchange=()=>{update("npcs",Array.from(document.querySelectorAll(".scene-npc:checked")).map(x=>x.value));setStatus("登場NPCを更新しました")});document.querySelectorAll(".transition-trigger,.transition-requires,.transition-target").forEach(el=>{el.oninput=updateTransitions;el.onchange=updateTransitions});document.querySelectorAll("[data-remove-transition]").forEach(btn=>btn.onclick=()=>{const idx=Number(btn.dataset.removeTransition);update("transitions",(scene().transitions||[]).map(normalizeTransitionSimple).filter((_,i)=>i!==idx));renderTab()});const addBtn=$("btnAddTransition");if(addBtn)addBtn.onclick=()=>{update("transitions",[...(scene().transitions||[]).map(normalizeTransitionSimple),{trigger:"",requires:"",conditionValue:"",target:""}]);renderTab()};if(input)input.onchange=e=>{const file=e.target.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{sceneBackgrounds[key]=reader.result;renderTab();setStatus("背景画像を読み込みました")};reader.readAsDataURL(file)}};const defaultSceneKey="ch1:scene:0";if(!sceneOverrides[defaultSceneKey]?.transitions)sceneOverrides[defaultSceneKey]={...(sceneOverrides[defaultSceneKey]||{}),transitions:[{trigger:"奥へ進む",requires:"",conditionValue:"",target:"scene:2"}]};renderAll();
</script>
<script>
/* 補助パネルの利用方法を、プロンプト出力とAI実行から切り替える。 */
renderRightPanel=()=>{const s=scene();const global=activeTab==="world"||activeTab==="cast"||activeTab==="rules"||activeTab==="export";const globalLabel=activeTab==="world"?"キャンペーン／世界設定":activeTab==="cast"?"キャンペーン／キャスト":activeTab==="rules"?"キャンペーン／共通ルール":"ゲーム出力";const label=s.type==="scene"?`シーン${s.id}「${s.name}」`:s.name;let html=`<div class="right-section"><h3>現在の対象</h3><p>${global?globalLabel:`${CHAPTERS[activeChapter].name} / ${label}`}</p></div>`;if(activeTab==="playtest"){html+=`<div class="right-section"><h3>この場面の目的</h3><p>${escapeHtml(s.goal||"未設定")}</p></div><div class="right-section"><h3>プレイメモ</h3><textarea id="notes" placeholder="未解決入力、気づき、次の確認事項"></textarea></div>`}else if(activeTab==="draft"){html+=`<div class="right-section"><h3>生成レビュー</h3><p>AI APIは中央ペインから明示的に実行します。</p></div>`}else if(activeTab==="export"){html+=`<div class="right-section"><h3>出力確認</h3><p>ゲーム側へ渡すJSONの出力先と内容を確認します。</p></div>`}else{const promptMode=assistantMode==="prompt";html+=`<div class="right-section"><h3>次の操作</h3><p>${global?"この設定を確認・編集します。":"現在の対象を設計補助します。"}</p><div class="switch-row"><span>使用方法</span><span><button class="${promptMode?"":"ghost"}" data-assistant-mode="prompt">プロンプト</button><button class="${promptMode?"ghost":""}" data-assistant-mode="ai">AI使用</button></span></div>${promptMode?`<button class="sub" id="btnSuggest">プロンプトを表示</button><div id="suggestion" class="card hidden"></div>`:`<div class="field"><label>AIへの追加指示</label><textarea id="assistantInstruction" placeholder="例：世界設定の不足点を3つ、優先度順に指摘してください"></textarea></div><button id="btnAssistantAI">AIで相談</button>${assistantAiResult?`<pre class="card" id="assistantAiOutput" style="white-space:pre-wrap;max-height:320px;overflow:auto">${escapeHtml(assistantAiResult)}</pre>`:""}`}</div><div class="right-section"><h3>検証</h3><ul id="validation" class="validation"></ul></div>`}$('rightBody').innerHTML=html;document.querySelectorAll("[data-assistant-mode]").forEach(btn=>btn.onclick=()=>{assistantMode=btn.dataset.assistantMode;assistantAiResult="";saveWorkspaceDraft(true);renderRightPanel();renderValidation()});const suggest=$("btnSuggest");if(suggest)suggest.onclick=()=>{$("suggestion").classList.remove("hidden");$("suggestion").innerHTML=`${promptBlock("codex","Codex")}${promptBlock("claude","Claude")}`;document.querySelectorAll("[data-copy-text]").forEach(btn=>btn.onclick=()=>{navigator.clipboard.writeText(btn.dataset.copyText).then(()=>setStatus("プロンプトをコピーしました")).catch(e=>setStatus("コピーに失敗しました: "+e.message))})};const ai=$("btnAssistantAI");if(ai)ai.onclick=async()=>{const instruction=$("assistantInstruction").value.trim()||"現在の対象の不足点と、次に決めるべき事項を整理してください。";ai.disabled=true;setStatus("AI相談中…");try{assistantAiResult=await callLLM("あなたはTASの設計補助です。確定データを勝手に変更せず、提案と未確定事項を分けて回答してください。",[{role:"user",content:`${assistantPrompt("claude")}\n\n追加指示:\n${instruction}`}],4000);renderRightPanel();renderValidation();setStatus("AI相談が完了しました")}catch(e){setStatus(`AI相談に失敗しました: ${e.message}`)}finally{const current=$("btnAssistantAI");if(current)current.disabled=false}}};
renderAll();
</script>

<script>
// ブラウザ標準の prompt に依存せず、キャンペーン名をファイル名として保存する。
saveCampaignFile=()=>{try{const filename=`${sanitizeFilename(campaignName)}.json`;const payload={version:1,savedAt:new Date().toISOString(),data:workspaceDraft()};const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const link=document.createElement("a");link.href=url;link.download=filename;document.body.appendChild(link);link.click();link.remove();setTimeout(()=>URL.revokeObjectURL(url),0);saveWorkspaceDraft();setStatus(`キャンペーンデータを保存しました: ${filename}`)}catch(error){setStatus(`保存に失敗しました: ${error.message}`)}};

<script>

<script>
/* テキストプレイ最小ランタイム: 入力を要素・発話・イベント・遷移へ接続する。 */
let playtestRuntime={discovered:{},flags:{},items:{},npcs:{},unlocked:{},battles:{},fired:{},logs:{},notes:{}};
const playtestKey=()=>`${activeChapter}:${sceneKey()}`;
const playtestTextMatch=(text,...values)=>values.some(value=>{const raw=String(value||"").trim();return raw&&text.includes(raw)});
const playtestDiscoveryEntries=n=>(n.discoveries||[]).map((value,index)=>normalizeDiscoveryFor(n,value,index));
const playtestConditionMatches=(condition,state)=>{const raw=String(condition||"").trim();if(!raw)return true;return raw.split(/\s+OR\s+/i).some(orPart=>orPart.split(/\s+AND\s+/i).every(part=>{const token=part.trim().replace(/^(flag|discovery|item|npc|scene|battle):/i,"");return Boolean(state.flags[token]||state.discovered[token]||state.items[token]||state.npcs[token]||state.unlocked[token]||state.battles[token])}))};
const playtestState=()=>({flags:playtestRuntime.flags,discovered:playtestRuntime.discovered,items:playtestRuntime.items,npcs:playtestRuntime.npcs,unlocked:playtestRuntime.unlocked,battles:playtestRuntime.battles});
const playtestLog=(key,type,text)=>{playtestRuntime.logs[key]??=[];playtestRuntime.logs[key].push({type,text})};
const playtestTargetLabel=(eventType,targetId,rule,n)=>{const options=eventTargetOptions(eventType,n);return options.find(x=>x.value===targetId)?.label||rule.targetLabel||targetId||"対象"};
function playtestApplyEvent(rule,n){const id=String(rule.targetId||rule.targetLabel||"").trim();if(!rule.eventType)return "";const label=playtestTargetLabel(rule.eventType,id,rule,n);if(rule.eventType==="flag_add"&&id)playtestRuntime.flags[id]=true;if(rule.eventType==="item_grant"&&id)playtestRuntime.items[id]=true;if(rule.eventType==="npc_join"&&id)playtestRuntime.npcs[id]=true;if(rule.eventType==="scene_unlock"&&id)playtestRuntime.unlocked[id]=true;if(rule.eventType==="battle_start"&&id)playtestRuntime.battles[id]=true;if(rule.eventType==="discovery_reveal"&&id)playtestRuntime.discovered[id]=true;const text=rule.eventType==="battle_start"?`バトル発生：${label}`:rule.eventType==="item_grant"?`アイテムを入手：${label}`:rule.eventType==="npc_join"?`NPCが参加：${label}`:rule.eventType==="scene_unlock"?`シーンを解放：${label}`:rule.eventType==="discovery_reveal"?`要素を開示：${label}`:rule.eventType==="flag_add"?`フラグ付与：${label}`:"";return text?`${text}${rule.eventNotes?`（${rule.eventNotes}）`:""}`:""}
function playtestRevealDiscoveries(text,n){const found=[];for(const d of playtestDiscoveryEntries(n)){if(playtestRuntime.discovered[d.id])continue;if(playtestTextMatch(text,d.id,d.label,d.trigger,d.surface)){playtestRuntime.discovered[d.id]=true;d.tags.forEach(tag=>{if(tag)playtestRuntime.flags[tag]=true});found.push(d)}}return found}
function playtestFireDialogue(text,n){const state=playtestState();const rules=(sceneOverrides[sceneKey()]?.dialogueRules||[]).map(normalizeDialogueRule).sort((a,b)=>({high:0,medium:1,low:2}[a.priority]??1)-({high:0,medium:1,low:2}[b.priority]??1));const messages=[];for(const rule of rules){if(rule.once&&playtestRuntime.fired[rule.id])continue;if(rule.hiddenUntilTriggered&&!playtestConditionMatches(rule.condition,state))continue;if(!playtestConditionMatches(rule.condition,state))continue;if(rule.line)messages.push(`${speakerLabel(rule.speaker)}：${rule.line}`);const event=playtestApplyEvent(rule,n);if(event)messages.push(event);playtestRuntime.fired[rule.id]=true}return messages}
function playtestFindTransition(text,n){const transitions=(n.transitions||[]).map(normalizeTransitionSimple);return transitions.find(t=>t.target&&playtestTextMatch(text,t.trigger)&&playtestConditionMatches(t.requires,playtestState()))}
function playtestMoveTo(target){const match=String(target||"").match(/^scene:(\d+)$/);const next=match?chapterNodes().find(x=>x.type==="scene"&&String(x.id)===match[1]):chapterNodes().find(x=>sceneRef(x)===target);if(!next)return false;selectedNode={type:next.type,index:next.index};activeTab="playtest";renderScenes();renderAll();return true}
function renderPlaytest(){const s=scene();const label=s.type==="scene"?`シーン${s.id}`:s.type==="opening"?"オープニング":s.type==="intermission"?"インターミッション":"エンディング";const key=playtestKey();const logs=playtestRuntime.logs[key]||[];const discovered=playtestDiscoveryEntries(s).filter(d=>playtestRuntime.discovered[d.id]);const status=`発見 ${discovered.length}/${playtestDiscoveryEntries(s).length}・フラグ ${Object.keys(playtestRuntime.flags).length}・所持品 ${Object.keys(playtestRuntime.items).length}`;return `<h2>テキストプレイ</h2><p class="hint">要素・会話・イベント・シーン遷移を簡易判定するプレイテストです。入力は登録済みの文言に一致した場合に反映されます。</p><div class="card"><div class="meta-row"><h3>${escapeHtml(label)}「${escapeHtml(s.name)}」</h3><span class="chip summary-chip">${escapeHtml(status)}</span></div><p class="hint">例：${escapeHtml(playtestDiscoveryEntries(s)[0]?.trigger||playtestDiscoveryEntries(s)[0]?.label||"周囲を調べる")} / 登録済みの行動を入力</p></div><div id="chat" class="chat"><p class="msg system">${escapeHtml(label)}「${escapeHtml(s.name)}」を開始しました。</p><p class="msg system">開始時の説明：${escapeHtml(s.brief||"")}</p>${logs.map(log=>`<p class="msg ${log.type===`user`?`user`:`system`}">${escapeHtml(log.text)}</p>`).join("")}</div><div class="play-input"><input id="playInput" placeholder="例：封鎖の木柵を調べる"><button id="sendPlay">送る</button></div><div class="field" style="margin-top:12px"><label>未解決入力・気づき</label><textarea id="playNotes" placeholder="この入力はどのIntentに分類すべきか">${escapeHtml(playtestRuntime.notes[key]||"")}</textarea></div>`}
function bindPlaytest(){const input=$("playInput"),chat=$("chat"),key=playtestKey(),n=scene();const append=(type,text)=>{playtestLog(key,type,text);chat.insertAdjacentHTML("beforeend",`<p class="msg ${type===`user`?`user`:`system`}">${escapeHtml(text)}</p>`);chat.scrollTop=chat.scrollHeight};const run=()=>{const text=input.value.trim();if(!text)return;append("user",`プレイヤー：${text}`);const found=playtestRevealDiscoveries(text,n);found.forEach(d=>{append("system",`要素を発見：${d.label}`);if(d.surface)append("system",d.surface);if(d.fact)append("system",`確定事実：${d.fact}`)});playtestFireDialogue(text,n).forEach(message=>append("system",message));const transition=playtestFindTransition(text,n);if(transition){append("system",`シーン遷移：${sceneRefLabel(chapterNodes().find(x=>sceneRef(x)===transition.target)||{name:transition.target})}`);playtestMoveTo(transition.target)}else if(!found.length){append("system","該当する要素・発話・遷移はありません。別の言い方を試すか、未解決入力に記録してください。")}input.value="";renderRightPanel()};$("sendPlay").onclick=run;input.onkeydown=e=>{if(e.key==="Enter")run()};const notes=$("playNotes");if(notes)notes.oninput=e=>{playtestRuntime.notes[key]=e.target.value}};
</script>
<script>

</script>
