<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>音声入力だけの最小モック</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #14161c; --panel: #1d2029; --line: #33394a;
    --text: #d8dae2; --dim: #8b90a0;
    --mic-off: #33394a; --mic-on: #d96b6b;
    --ok: #6fbf85;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px;
  }
  h1 { font-size: 14px; color: var(--dim); letter-spacing: .08em; margin-bottom: 4px; }
  .sub { font-size: 11.5px; color: var(--dim); margin-bottom: 28px; text-align: center; }

  #micBtn {
    width: 96px; height: 96px; border-radius: 50%;
    border: 2px solid var(--mic-off); background: var(--panel);
    color: var(--text); font-size: 28px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .15s, background .15s;
  }
  #micBtn.listening { border-color: var(--mic-on); background: rgba(217,107,107,.12); }
  #micStatus { margin-top: 10px; font-size: 12.5px; color: var(--dim); height: 16px; }

  #transcriptBox {
    width: 100%; max-width: 480px; margin-top: 28px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 16px; min-height: 64px; font-size: 15px; line-height: 1.6;
  }
  #interim { color: var(--dim); }

  #log {
    width: 100%; max-width: 480px; margin-top: 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .entry {
    background: var(--panel); border-left: 3px solid var(--ok);
    border-radius: 0 8px 8px 0; padding: 8px 12px; font-size: 13.5px;
  }
  .entry .meta { font-size: 11px; color: var(--dim); margin-top: 4px; }

  #unsupported {
    max-width: 480px; text-align: center; color: var(--dim); font-size: 13px;
    margin-top: 40px; display: none;
  }
</style>
</head>
<body>
<h1>音声入力 検証モック</h1>
<div class="sub">GMロジックなし。音声認識(STT)の精度とレイテンシだけを見る。<br>マイクを押して話す→離すと確定。</div>

<button id="micBtn" onclick="toggleListening()">🎤</button>
<div id="micStatus">待機中</div>

<div id="transcriptBox">
  <span id="finalText"></span><span id="interim"></span>
</div>

<div id="log"></div>

<div id="unsupported">
  このブラウザは音声認識(Web Speech API)に対応していません。<br>
  Chromeなど対応ブラウザでお試しください。
</div>

<script>
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let listening = false;
let utteranceStartedAt = 0; // 直近の発話(interim開始)からの経過を測る
let silenceTimer = null;
const SILENCE_LIMIT_MS = 5000;

function resetSilenceTimer() {
  if (silenceTimer) clearTimeout(silenceTimer);
  silenceTimer = setTimeout(() => { stopListening("無音が続いたため停止しました"); }, SILENCE_LIMIT_MS);
}

if (!SR) {
  document.getElementById("unsupported").style.display = "block";
} else {
  recognition = new SR();
  recognition.lang = "ja-JP";
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onresult = (e) => {
    resetSilenceTimer(); // 何か認識された(interim含む)ので無音タイマーを延長
    let finalChunk = "", interimChunk = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalChunk += t;
      else interimChunk += t;
    }
    // このターンの発話がまだ計測開始されていなければ、ここが発話開始点
    if (!utteranceStartedAt && (finalChunk || interimChunk)) {
      utteranceStartedAt = performance.now();
    }
    if (finalChunk) {
      const latency = ((performance.now() - utteranceStartedAt) / 1000).toFixed(1);
      addLogEntry(finalChunk, latency);
      document.getElementById("finalText").textContent = "";
      utteranceStartedAt = 0; // 次の発話のために計測をリセット
    }
    document.getElementById("interim").textContent = interimChunk;
  };

  recognition.onerror = (e) => {
    setStatus("エラー: " + e.error);
    addLogEntry("⚠ " + describeError(e.error), "-");
    listening = false;
    document.getElementById("micBtn").classList.remove("listening");
  };

  recognition.onstart = () => { setStatus("聞いています…(認識開始)"); };

  recognition.onaudiostart = () => { setStatus("聞いています…(音声取得中)"); };

  recognition.onend = () => {
    if (listening) recognition.start(); // ボタンを押している間は継続させる
  };
}

function setStatus(t) { document.getElementById("micStatus").textContent = t; }

function describeError(code) {
  const map = {
    "not-allowed": "マイク権限が許可されていません(ブラウザ/OSの設定、またはこの画面がマイクを使えない環境の可能性)",
    "service-not-allowed": "この環境(埋め込み表示など)では音声認識サービスの利用が許可されていません",
    "no-speech": "音声が検出されませんでした",
    "audio-capture": "マイクにアクセスできません(デバイスが見つからない)",
    "network": "ネットワークエラー(音声認識はオンライン処理のため通信が必要です)",
    "aborted": "認識が中断されました"
  };
  return map[code] || ("不明なエラー: " + code);
}

function addLogEntry(text, latency) {
  const log = document.getElementById("log");
  const el = document.createElement("div");
  el.className = "entry";
  const time = new Date().toLocaleTimeString("ja-JP", { hour12: false });
  el.innerHTML = `${text}<div class="meta">${time} ・ 確定まで ${latency}s</div>`;
  log.prepend(el);
}

function toggleListening() {
  if (!SR) return;
  if (listening) { stopListening(); } else { startListening(); }
}

function startListening() {
  listening = true;
  utteranceStartedAt = 0;
  document.getElementById("micBtn").classList.add("listening");
  setStatus("聞いています…");
  document.getElementById("interim").textContent = "";
  resetSilenceTimer(); // 話し始める前から無音カウントを開始(押したまま黙っていても5秒で止まる)
  try { recognition.start(); } catch (e) { /* 既に開始している場合は無視 */ }
}

function stopListening(reason) {
  listening = false;
  if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
  document.getElementById("micBtn").classList.remove("listening");
  setStatus(reason || "待機中");
  document.getElementById("interim").textContent = "";
  try { recognition.stop(); } catch (e) {}
}
</script>
</body>
</html>
